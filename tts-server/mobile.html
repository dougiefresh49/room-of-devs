  <script>
(() => {
  const $ = (id) => document.getElementById(id);
  const SILENT_WAV = "data:audio/wav;base64,UklGRjQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YRAAAAAAAAAAAAAAAAAAAAAAAAAA";

  const conn = $("conn");
  const members = $("members");
  const messagesEl = $("messages");
  const audio = $("audio");
  const toastEl = $("toast");
  const mini = $("mini");
  const miniAvatar = $("mini-avatar");
  const miniName = $("mini-name");
  const miniDevice = $("mini-device");
  const miniPreview = $("mini-preview");
  const miniPp = $("mini-pp");
  const expanded = $("expanded");
  const expAvatar = $("exp-avatar");
  const expName = $("exp-name");
  const expKaraoke = $("exp-karaoke");
  const expDeviceRow = $("exp-device-row");
  const expReplyWrap = $("exp-reply-wrap");
  const progressFill = $("progress-fill");
  const btnClear = $("btn-clear");
  const newPill = $("new-pill");
  const btnPp = $("btn-pp");
  const btnPrev = $("btn-prev");
  const btnNext = $("btn-next");
  const btnStop = $("btn-stop");
  const hiddenDevs = $("hidden-devs");
  const btnHiddenDevs = $("btn-hidden-devs");
  const hiddenDevsList = $("hidden-devs-list");
  const overflowMenu = $("overflow-menu");
  const heldPill = $("held-pill");
  const picker = $("picker");
  const pickerBackdrop = $("picker-backdrop");
  const pickerPersonas = $("picker-personas");
  const pickerList = $("picker-list");
  const miniProgressFill = $("mini-progress-fill");
  const expMessage = $("exp-message");
  const expKaraokeEl = $("exp-karaoke");
  const expStatus = $("exp-status");
  const expTabs = $("exp-tabs");
  const btnRestart = $("btn-restart");
  const headerDevice = $("header-device");
  const miCatchup = $("mi-catchup");
  const clearConfirm = $("clear-confirm");

  const LISTENED_KEY = "mobile_listened_files";
  const CLEARED_KEY = "mobile_cleared_files";
  const HIDDEN_DEVS_KEY = "mobile_hidden_dev_names_v1";
  const OUTPUT_KEY = "mobile_output_device";
  const INITIAL_HIDDEN_DEV_NAMES = ["job-search-2026"];

  let snapshot = { agents: [], nowPlaying: null, roomHeld: false, paused: false };
  let charactersPayload = { characters: {}, sessionVoices: {} };
  let karaokeTimer = null;
  let toastTimer = null;
  let allReplayList = [];
  let replayList = [];

  // Phone replay track state (the phone <audio> plane).
  let phoneMeta = null;        // current/last replay entry loaded into <audio>
  let currentIndex = -1;
  let phonePendingTap = false; // file loaded but autoplay rejected — needs a tap
  let audioUnlocked = false;
  let lastPhonePauseAt = 0;    // remembered position when mac-live pre-empted us

  // Expanded player: Transcript | Message tab (§C3).
  let expTab = "transcript";
  // Seek to apply once a freshly-loaded replay reports its duration.
  let pendingSeekSec = 0;
  // Live handoff (§A3): awaiting the mac→phone replay record after a stop.
  let handoffAwait = null;     // { offsetSec, sessionId, startedAt, character, name }
  let handoffTimer = null;

  // Inline SVG icon markup for template strings.
  function iconHtml(id, extra) {
    return `<svg class="icon${extra ? " " + extra : ""}" aria-hidden="true"><use href="#i-${id}"/></svg>`;
  }

  // Catch-up / messages
  let catchUpMode = false;
  let catchUpQueue = [];

  // SSE / new-message detection
  let lastNowPlayingKey = null;
  let knownFiles = new Set();
  let pendingNewEntry = null;

  // Output preference (§1)
  function loadOutput() {
    try {
      const v = localStorage.getItem(OUTPUT_KEY);
      return v === "phone" ? "phone" : "mac";
    } catch {
      return "mac";
    }
  }
  let outputPref = loadOutput();
  function setOutput(v) {
    outputPref = v === "phone" ? "phone" : "mac";
    try { localStorage.setItem(OUTPUT_KEY, outputPref); } catch { /* quota */ }
    renderHeaderDevice();
    renderMembers();
    renderExpandedChrome();
  }
  function renderHeaderDevice() {
    for (const seg of headerDevice.querySelectorAll(".dev-seg")) {
      seg.classList.toggle("active", seg.getAttribute("data-device") === outputPref);
    }
  }

  // Reply drafts survive member re-renders (Wispr Flow keyboard needs a stable field).
  const replyDrafts = {};
  let openReplySession = null;

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2400);
  }

  /* --------------- localStorage sets --------------- */
  function loadStrSet(key) {
    try {
      const raw = localStorage.getItem(key);
      const arr = raw ? JSON.parse(raw) : [];
      return new Set(Array.isArray(arr) ? arr : []);
    } catch {
      return new Set();
    }
  }
  function saveStrSet(key, set) {
    try {
      localStorage.setItem(key, JSON.stringify([...set]));
    } catch {
      /* quota */
    }
  }

  let listened = loadStrSet(LISTENED_KEY);
  let clearedFiles = loadStrSet(CLEARED_KEY);

  function pruneAgainst(set, key, list) {
    const files = new Set((list || []).map((e) => e.file).filter(Boolean));
    let changed = false;
    for (const f of [...set]) {
      if (!files.has(f)) {
        set.delete(f);
        changed = true;
      }
    }
    if (changed) saveStrSet(key, set);
  }

  function markListened(file) {
    if (!file || listened.has(file)) return;
    listened.add(file);
    saveStrSet(LISTENED_KEY, listened);
    renderMessages();
    updateBars();
  }

  /* --------------- Hidden devs (preserved) --------------- */
  function loadHiddenDevNames() {
    const seed = () => {
      const set = new Set(INITIAL_HIDDEN_DEV_NAMES);
      try {
        localStorage.setItem(HIDDEN_DEVS_KEY, JSON.stringify([...set].sort()));
      } catch { /* ignore quota */ }
      return set;
    };
    let raw;
    try {
      raw = localStorage.getItem(HIDDEN_DEVS_KEY);
    } catch {
      return new Set(INITIAL_HIDDEN_DEV_NAMES);
    }
    if (raw === null) return seed();
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch {
      return seed();
    }
    if (!Array.isArray(parsed)) return seed();
    const norm = parsed
      .filter((v) => typeof v === "string")
      .map((v) => v.trim())
      .filter(Boolean);
    const set = new Set(norm);
    if (norm.length !== parsed.length || set.size !== norm.length) {
      try {
        localStorage.setItem(HIDDEN_DEVS_KEY, JSON.stringify([...set].sort()));
      } catch { /* keep in-memory set */ }
    }
    return set;
  }
  function saveHiddenDevNames() {
    try {
      localStorage.setItem(HIDDEN_DEVS_KEY, JSON.stringify([...hiddenDevNames].sort()));
      return true;
    } catch {
      toast("Could not save hidden devs");
      return false;
    }
  }
  let hiddenDevNames = loadHiddenDevNames();

  function isHiddenDevName(name) {
    const n = String(name || "").trim();
    return !!n && hiddenDevNames.has(n);
  }
  function agentRawName(agent) {
    return String(agent?.name || "").trim();
  }
  function agentForSession(sessionId) {
    return (snapshot.agents || []).find((a) => a.sessionId === sessionId);
  }
  function entryRawName(entry) {
    const sn = String(entry?.sessionName || "").trim();
    if (sn) return sn;
    return agentRawName(agentForSession(entry?.sessionId));
  }
  function isReplayEntryHidden(entry) {
    return isHiddenDevName(entryRawName(entry));
  }
  function visibleAgents() {
    return (snapshot.agents || []).filter((a) => !isHiddenDevName(agentRawName(a)));
  }
  function isInjectable(agent) {
    // Server contract: agent.injectable. Degrade to isTeam until it ships.
    if (typeof agent?.injectable === "boolean") return agent.injectable;
    return !!agent?.isTeam;
  }

  /* --------------- helpers --------------- */
  async function postAction(body) {
    try {
      const res = await fetch("/action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) return null;
      try { return await res.json(); } catch { return {}; }
    } catch {
      return null;
    }
  }

  function setImg(el, src) {
    // Avoid reassigning identical src (would re-decode / flicker on every tick).
    if (el.getAttribute("src") !== src) el.src = src;
  }

  function escapeHtml(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function avatarDir(agent) {
    if (agent.character) return String(agent.character).toLowerCase();
    const voices = charactersPayload.sessionVoices || {};
    const chars = charactersPayload.characters || {};
    const voiceId = voices[agent.sessionId];
    if (voiceId && chars[voiceId]?.name) {
      return String(chars[voiceId].name).toLowerCase();
    }
    return "default";
  }
  function avatarSrc(character, frame) {
    return `/avatars/tmnt/${encodeURIComponent(character)}/${frame}.png`;
  }
  function entryCharacter(entry) {
    if (entry?.character) return String(entry.character).toLowerCase();
    if (entry?.sessionId) {
      const agent = agentForSession(entry.sessionId);
      if (agent) return avatarDir(agent);
    }
    return "default";
  }
  function entryName(entry) {
    if (entry?.sessionName) {
      const a = (snapshot.agents || []).find((x) => agentRawName(x) === entry.sessionName);
      if (a) return a.label || a.name || entry.sessionName;
      return entry.sessionName;
    }
    if (entry?.sessionId) {
      const agent = agentForSession(entry.sessionId);
      if (agent) return agent.label || agent.name || entry.sessionId.slice(0, 8);
    }
    return entry?.character || "Unknown";
  }
  function entryPreview(entry) {
    const t = entry?.textPreview || entry?.spokenText || "";
    return t.length > 90 ? t.slice(0, 90) + "…" : t;
  }
  function timeAgo(ts) {
    if (!ts) return "";
    const t = Date.parse(ts);
    if (!Number.isFinite(t)) return "";
    const sec = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (sec < 60) return `${sec}s ago`;
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min}m ago`;
    const hr = Math.floor(min / 60);
    if (hr < 48) return `${hr}h ago`;
    return `${Math.floor(hr / 24)}d ago`;
  }
  function fmtTime(sec) {
    if (!Number.isFinite(sec) || sec < 0) return "0:00";
    const s = Math.floor(sec);
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${m}:${r < 10 ? "0" : ""}${r}`;
  }

  /* ============================================================
     §0  PLAYER STATE MODEL
     ============================================================ */
  function isNowPlayingActive(np) {
    return !!(np && !np.endedAt && np.kind !== "ack" && np.text);
  }

  // The one discriminated state that drives ALL player chrome.
  function computePlayerState() {
    const np = snapshot.nowPlaying;
    const active = isNowPlayingActive(np);
    // Mac speaking through its own speakers → mac-live owns the player.
    if (active && np.output !== "phone") {
      return { kind: "mac-live", nowPlaying: np };
    }
    // Otherwise, any loaded phone replay (playing, paused, or awaiting a tap).
    if (phoneMeta) {
      return { kind: "phone-replay", entry: phoneMeta, index: currentIndex };
    }
    return { kind: "none" };
  }

  function isMacLive() {
    return computePlayerState().kind === "mac-live";
  }

  /* --------------- mac-live progress with pause anchor --------------- */
  let macTrackKey = null;
  let macPausedAccumMs = 0;
  let macPauseStartMs = null;
  function macElapsedMs(np) {
    const key = `${np.startedAt}|${(np.text || "").slice(0, 24)}`;
    if (key !== macTrackKey) {
      macTrackKey = key;
      macPausedAccumMs = 0;
      macPauseStartMs = null;
    }
    const started = Date.parse(np.startedAt);
    if (!Number.isFinite(started)) return 0;
    const paused = !!snapshot.paused;
    if (paused && macPauseStartMs === null) macPauseStartMs = Date.now();
    if (!paused && macPauseStartMs !== null) {
      macPausedAccumMs += Date.now() - macPauseStartMs;
      macPauseStartMs = null;
    }
    const nowRef = paused ? macPauseStartMs : Date.now();
    const rate = np.playbackRate && np.playbackRate > 0 ? np.playbackRate : 1;
    return Math.max(0, (nowRef - started - macPausedAccumMs) * rate);
  }
  function macDurationMs(np) {
    const alignment = np.alignment;
    if (Array.isArray(alignment) && alignment.length) {
      let maxMs = 0;
      for (const row of alignment) {
        const ms = row?.[1];
        if (typeof ms === "number" && ms > maxMs) maxMs = ms;
      }
      if (maxMs > 0) return maxMs + 400;
    }
    const cps = np.approxCharsPerSec > 0 ? np.approxCharsPerSec : 15;
    const guess = ((np.text || "").length / cps) * 1000;
    return guess > 0 ? guess : 60000;
  }

  /* --------------- phone track duration --------------- */
  function trackDurationSec() {
    const d = audio.duration;
    if (Number.isFinite(d) && d > 0) return d;
    const alignment = phoneMeta?.alignment;
    if (Array.isArray(alignment) && alignment.length) {
      let maxMs = 0;
      for (const row of alignment) {
        const ms = row?.[1];
        if (typeof ms === "number" && ms > maxMs) maxMs = ms;
      }
      if (maxMs > 0) return maxMs / 1000 + 0.4;
    }
    return 0;
  }

  function karaokeFromAlignment(text, alignment, elapsedMs) {
    if (Array.isArray(alignment) && alignment.length) {
      let active = -1;
      for (let i = 0; i < alignment.length; i++) {
        const startMs = alignment[i][1];
        if (typeof startMs === "number" && startMs <= elapsedMs) active = i;
      }
      return alignment
        .map(([word], i) => {
          const cls = i === active ? "w on" : i < active ? "w past" : "w";
          return `<span class="${cls}">${escapeHtml(word)}</span>`;
        })
        .join(" ");
    }
    return escapeHtml(text || "");
  }

  /* ============================================================
     §2  UNIFIED PLAYER (mini + expanded)
     ============================================================ */
  // Static one-line preview — CSS handles ellipsis, no marquee/karaoke (§C2).
  let lastPreviewText = null;
  function setMiniPreview(text) {
    if (text === lastPreviewText) return;
    lastPreviewText = text;
    miniPreview.textContent = text || "";
  }

  // Player "subject" = who + what the player is currently about.
  function playerSubject() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      const np = ps.nowPlaying;
      const agent = agentForSession(np.sessionId);
      return {
        character: agent ? avatarDir(agent) : "default",
        name: agent ? agent.label || agent.name : np.sessionId.slice(0, 8),
        preview: (np.text || "").slice(0, 120),
        sessionId: np.sessionId,
      };
    }
    if (ps.kind === "phone-replay") {
      const e = ps.entry;
      return {
        character: entryCharacter(e),
        name: entryName(e),
        preview: phonePendingTap
          ? "Ready — tap to play"
          : e.spokenText || e.textPreview || "",
        sessionId: e.sessionId || null,
      };
    }
    // Handoff in flight (mac stopped, phone file not yet arrived): keep the
    // player visible with the moving-over subject.
    if (handoffAwait) {
      return {
        character: handoffAwait.character,
        name: handoffAwait.name,
        preview: "Moving to this phone…",
        sessionId: handoffAwait.sessionId,
      };
    }
    return null;
  }

  // Returns the icon id ("play" | "pause") for the current transport state.
  function ppIcon() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") return snapshot.paused ? "play" : "pause";
    if (ps.kind === "phone-replay") {
      if (phonePendingTap) return "play";
      return !audio.paused && !audio.ended ? "pause" : "play";
    }
    return "play";
  }
  let lastPpIcon = null;
  function renderPpButtons() {
    const id = ppIcon();
    if (id === lastPpIcon) return;
    lastPpIcon = id;
    miniPp.innerHTML = iconHtml(id, "filled");
    btnPp.innerHTML = iconHtml(id, "filled");
  }

  function renderMiniChrome() {
    const subject = playerSubject();
    const show = !!subject;
    if (show) {
      mini.classList.add("on");
      document.body.classList.remove("player-hidden");
    } else {
      mini.classList.remove("on");
      document.body.classList.add("player-hidden");
      lastPreviewText = null;
      return;
    }
    const ps = computePlayerState();
    const macl = ps.kind === "mac-live";
    const frame = macl ? "speaking" : "idle";
    miniName.textContent = subject.name;
    miniAvatar.onerror = () => {
      miniAvatar.onerror = null;
      miniAvatar.src = avatarSrc("default", frame);
    };
    setImg(miniAvatar, avatarSrc(subject.character, frame));
    // Device glyph: laptop (Mac, accent) / smartphone (phone).
    if (miniDevice.dataset.macl !== String(macl)) {
      miniDevice.dataset.macl = String(macl);
      miniDevice.innerHTML = iconHtml(macl ? "laptop" : "smartphone");
    }
    miniDevice.classList.toggle("mac", macl);
    setMiniPreview(subject.preview || "");
    renderPpButtons();
    updatePlayerProgress();
  }

  function subjectMessageText(ps) {
    if (ps.kind === "mac-live") return ps.nowPlaying.text || "";
    if (ps.kind === "phone-replay") {
      const e = ps.entry;
      return e.rawText || e.spokenText || e.textPreview || "";
    }
    return "";
  }

  function renderExpandedContent() {
    const transcript = expTab === "transcript";
    for (const t of expTabs.querySelectorAll(".exp-tab")) {
      t.classList.toggle("active", t.getAttribute("data-exptab") === expTab);
    }
    expKaraokeEl.hidden = !transcript;
    expMessage.hidden = transcript;
    if (transcript) {
      updateExpandedKaraoke();
    } else {
      expMessage.textContent = subjectMessageText(computePlayerState());
    }
  }

  function renderExpandedChrome() {
    const ps = computePlayerState();
    const subject = playerSubject();
    if (!subject) {
      // Nothing to show — force-collapse.
      closeExpanded();
      return;
    }
    const macl = ps.kind === "mac-live";
    const phone = ps.kind === "phone-replay";
    const expFrame = macl ? "speaking" : "idle";
    expAvatar.onerror = () => {
      expAvatar.onerror = null;
      expAvatar.src = avatarSrc("default", expFrame);
    };
    setImg(expAvatar, avatarSrc(subject.character, expFrame));
    expName.textContent = subject.name;

    // Handoff status line (mac→phone in flight).
    expStatus.hidden = !handoffAwait;
    if (handoffAwait) expStatus.textContent = "Moving to this phone…";

    // Device row reflects the ACTUAL current source (green when Mac). While a
    // handoff to phone is in flight, phone is the destination source.
    const sourceDevice = macl ? "mac" : "phone";
    for (const seg of expDeviceRow.querySelectorAll(".seg")) {
      const dev = seg.getAttribute("data-device");
      const active = dev === sourceDevice;
      seg.classList.toggle("active", active);
      seg.classList.toggle("source-mac", active && dev === "mac");
    }

    // Transport visibility by kind: restart/prev/next are phone-only; stop is
    // mac-only; play/pause always shown.
    btnRestart.hidden = !phone;
    btnPrev.hidden = !phone;
    btnNext.hidden = !phone;
    btnStop.hidden = !macl;
    renderPpButtons();
    $("progress").classList.toggle("seekable", phone);

    if (phone) {
      btnPrev.disabled = currentIndex <= 0;
      btnNext.disabled = currentIndex < 0 || currentIndex >= replayList.length - 1;
    }

    renderExpandedReply(subject);
    updatePlayerProgress();
    renderExpandedContent();
  }

  let lastExpReplyAgent = null;
  function renderExpandedReply(subject) {
    const agent = subject.sessionId ? agentForSession(subject.sessionId) : null;
    const id = agent ? agent.sessionId : null;
    // Only rebuild when the subject agent changes — otherwise a snapshot tick
    // would wipe the textarea mid-type (Wispr Flow needs a stable field).
    if (id === lastExpReplyAgent && expReplyWrap.querySelector(".reply-box")) return;
    lastExpReplyAgent = id;
    if (!agent) {
      expReplyWrap.innerHTML = "";
      return;
    }
    expReplyWrap.innerHTML = replyBoxHtml(agent, "exp");
  }

  function updatePlayerProgress() {
    const ps = computePlayerState();
    let cur = 0;
    let dur = 0;
    if (ps.kind === "mac-live") {
      dur = macDurationMs(ps.nowPlaying) / 1000;
      cur = Math.min(dur, macElapsedMs(ps.nowPlaying) / 1000);
    } else if (ps.kind === "phone-replay") {
      dur = trackDurationSec();
      cur = audio.currentTime || 0;
    }
    const pct = dur > 0 ? Math.min(100, (cur / dur) * 100) : 0;
    progressFill.style.width = `${pct}%`;
    miniProgressFill.style.width = `${pct}%`;
    $("time-elapsed").textContent = fmtTime(cur);
    $("time-total").textContent = dur > 0 ? fmtTime(dur) : "0:00";
    $("progress").setAttribute("aria-valuenow", String(Math.round(pct)));
  }

  function updateExpandedKaraoke() {
    if (!expanded.classList.contains("open")) return;
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      const np = ps.nowPlaying;
      expKaraoke.innerHTML = karaokeFromAlignment(np.text, np.alignment, macElapsedMs(np));
    } else if (ps.kind === "phone-replay") {
      const e = ps.entry;
      const elapsed = (audio.currentTime || 0) * 1000;
      const text = e.spokenText || e.textPreview || "";
      expKaraoke.innerHTML = karaokeFromAlignment(text, e.alignment, elapsed);
    } else {
      expKaraoke.innerHTML = "";
    }
  }

  function renderPlayer() {
    renderMiniChrome();
    renderExpandedChrome();
  }

  function openExpanded() {
    if (!playerSubject()) return;
    expanded.classList.add("open");
    expanded.setAttribute("aria-hidden", "false");
    renderExpandedChrome();
  }
  function closeExpanded() {
    expanded.classList.remove("open");
    expanded.setAttribute("aria-hidden", "true");
  }

  /* ============================================================
     Transport (follows playerState.kind — §0)
     ============================================================ */
  async function transportPlayPause() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      const wasPaused = !!snapshot.paused;
      const ok = await postAction({ type: "pause" });
      if (ok) toast(wasPaused ? "Mac playback resumed" : "Mac playback paused");
      return;
    }
    if (ps.kind === "phone-replay") {
      if (phonePendingTap) {
        phonePendingTap = false;
        try {
          audio.muted = false;
          await audio.play();
        } catch {
          phonePendingTap = true;
          toast("Tap again to play");
        }
        renderPlayer();
        return;
      }
      // Strict toggle — NEVER reload the source (§C4). Resuming a paused track
      // continues from currentTime; only an already-ended track rewinds to 0.
      if (audio.paused) {
        if (audio.ended) {
          try { audio.currentTime = 0; } catch { /* not seekable */ }
        }
        try { await audio.play(); } catch { toast("Tap again to play"); }
      } else {
        audio.pause();
      }
      renderPlayer();
      return;
    }
    // none → play latest replay
    playLatest();
  }

  // Restart button (§C4): the ONLY explicit rewind that isn't track-end.
  async function restartTrack() {
    if (computePlayerState().kind !== "phone-replay") return;
    phonePendingTap = false;
    try { audio.currentTime = 0; } catch { /* not seekable */ }
    try { await audio.play(); } catch { toast("Tap again to play"); }
    renderPlayer();
  }

  async function transportStop() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      const ok = await postAction({ type: "stop" });
      if (ok) toast("Mac playback stopped");
      return;
    }
    clearPhonePlayback();
    renderPlayer();
  }

  /* ============================================================
     §1  Phone playback + priming
     ============================================================ */
  function primeAudio() {
    // Unlock <audio> inside a user gesture so a later SSE-driven play() works.
    if (audioUnlocked) return;
    // An element that's actively playing is already unlocked — replacing its
    // src with the silent primer would kill the in-progress replay.
    if (phoneMeta && audio.src && !audio.paused && !audio.ended) {
      audioUnlocked = true;
      return;
    }
    try {
      audio.muted = true;
      audio.src = SILENT_WAV;
      const p = audio.play();
      if (p && p.then) {
        p.then(() => {
          audio.pause();
          audio.muted = false;
          audioUnlocked = true;
        }).catch(() => {
          audio.muted = false;
        });
      }
    } catch { /* ignore */ }
  }

  function isPhoneIdle() {
    return !audio.src || audio.paused || audio.ended;
  }

  async function playReplayEntry(entry, { fromCatchUp, gated = true, seekSec = 0 } = {}) {
    if (!entry?.file) {
      toast("No replay");
      return;
    }
    if (isReplayEntryHidden(entry)) {
      toast("That dev is hidden");
      return;
    }
    // Arbitration: mac-live owns the player.
    if (gated && isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    if (!fromCatchUp) {
      catchUpMode = false;
      catchUpQueue = [];
    }
    phonePendingTap = false;
    currentIndex = replayList.findIndex((e) => e.file === entry.file);
    phoneMeta = entry;
    pendingNewEntry = null;
    newPill.classList.remove("on");
    pendingSeekSec = Number.isFinite(seekSec) && seekSec > 0 ? seekSec : 0;
    audio.muted = false;
    audio.src = `/replay-audio/${encodeURIComponent(entry.file)}`;
    audio.playbackRate =
      entry.playbackRate && entry.playbackRate > 0 ? entry.playbackRate : 1;
    renderPlayer();
    renderMessages();
    updateBars();
    try {
      await audio.play();
    } catch {
      // Autoplay rejected — surface a tap-to-play affordance.
      phonePendingTap = true;
      toast("Ready — tap to play");
    }
    renderPlayer();
  }

  async function playAtIndex(i, opts) {
    if (i < 0 || i >= replayList.length) return;
    await playReplayEntry(replayList[i], opts);
  }

  // §3 replay-match fallback: exact sessionId → newest same sessionName → toast.
  async function replayForAgent(agent) {
    if (isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    try {
      await refreshReplayList();
    } catch {
      toast("Replay list failed");
      return;
    }
    const displayName = agent.label || agent.name;
    // Search the FULL catalog — "Clear messages" hides entries from the
    // Messages list, but a card's Replay last should still find them.
    let entry = allReplayList.find((e) => e.sessionId === agent.sessionId);
    if (!entry) {
      const raw = agentRawName(agent);
      entry = allReplayList.find(
        (e) => String(e.sessionName || "").trim() === raw
      );
    }
    if (!entry) {
      toast(`No replays yet for ${displayName}`);
      return;
    }
    await playReplayEntry(entry);
  }

  async function playLatest() {
    if (isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    if (!replayList.length) {
      try { await refreshReplayList(); } catch { toast("Replay list failed"); return; }
    }
    if (!replayList.length) {
      toast("No replays yet");
      return;
    }
    await playReplayEntry(replayList[0]);
  }

  // Grant-to-phone: nowPlaying.output === "phone" → play exactly replayFile.
  async function maybePlayGrantToPhone(np) {
    const file = np.replayFile;
    if (!file) return;
    if (phoneMeta?.file === file && !isPhoneIdle()) return; // already on it
    // Try to enrich from the replay list (alignment, name), else synthesize.
    let entry = null;
    try {
      await refreshReplayList();
      entry = replayList.find((e) => e.file === file);
    } catch { /* fall through */ }
    if (!entry) {
      entry = {
        file,
        sessionId: np.sessionId,
        alignment: np.alignment,
        spokenText: np.text,
        textPreview: np.text,
        playbackRate: np.playbackRate,
      };
    }
    // Not gated by mac-live: this IS the routed phone output, not a Mac plane.
    await playReplayEntry(entry, { gated: false });
  }

  function clearPhonePlayback() {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    phoneMeta = null;
    currentIndex = -1;
    phonePendingTap = false;
    lastPhonePauseAt = 0;
    stopCatchUp();
    closeExpanded();
    renderPlayer();
    renderMessages();
    updateBars();
  }

  // Like clearPhonePlayback but keeps the sheet open — mac-live takes the
  // player via SSE right after a phone→mac handoff.
  function clearLocalForHandoff() {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    phoneMeta = null;
    currentIndex = -1;
    phonePendingTap = false;
    renderPlayer();
    renderMessages();
    updateBars();
  }

  /* ============================================================
     §A3  Live device handoff (Spotify pause-at-position model)
     ============================================================ */
  function cancelHandoff(msg) {
    clearTimeout(handoffTimer);
    handoffAwait = null;
    expStatus.hidden = true;
    renderPlayer();
    if (msg) toast(msg);
  }

  // Mac speaking → this phone. Capture position, stop the Mac, then play the
  // saved replay locally (seeked) once SSE delivers endedAt + replayFile.
  function beginMacToPhone() {
    const ps = computePlayerState();
    if (ps.kind !== "mac-live") return;
    const np = ps.nowPlaying;
    const rate = np.playbackRate && np.playbackRate > 0 ? np.playbackRate : 1;
    // Contract (§A3): offset = macElapsedMs/1000/playbackRate.
    const offsetSec = macElapsedMs(np) / 1000 / rate;
    const agent = agentForSession(np.sessionId);
    primeAudio(); // unlock <audio> inside this tap so a later play() works
    handoffAwait = {
      offsetSec,
      sessionId: np.sessionId,
      startedAt: np.startedAt,
      character: agent ? avatarDir(agent) : "default",
      name: agent ? agent.label || agent.name : String(np.sessionId || "").slice(0, 8),
    };
    clearTimeout(handoffTimer);
    handoffTimer = setTimeout(() => cancelHandoff("Couldn't move playback"), 15000);
    postAction({ type: "stop" }).then((r) => {
      if (!r) cancelHandoff("Couldn't move playback");
    });
    renderPlayer();
  }

  function checkMacToPhoneHandoff() {
    if (!handoffAwait) return;
    const np = snapshot.nowPlaying;
    if (!np || !np.replayFile || !np.endedAt) return;
    const sameSession = !handoffAwait.sessionId || np.sessionId === handoffAwait.sessionId;
    const sameStart =
      !handoffAwait.startedAt || !np.startedAt || np.startedAt === handoffAwait.startedAt;
    if (!sameSession || !sameStart) return;
    const { offsetSec } = handoffAwait;
    const file = np.replayFile;
    clearTimeout(handoffTimer);
    handoffAwait = null;
    expStatus.hidden = true;
    playHandoffFile(file, np, offsetSec);
  }

  async function playHandoffFile(file, np, offsetSec) {
    let entry = null;
    try {
      await refreshReplayList();
      entry =
        replayList.find((e) => e.file === file) ||
        allReplayList.find((e) => e.file === file);
    } catch { /* fall through */ }
    if (!entry) {
      entry = {
        file,
        sessionId: np.sessionId,
        alignment: np.alignment,
        spokenText: np.text,
        textPreview: np.text,
        playbackRate: np.playbackRate,
      };
    }
    await playReplayEntry(entry, { gated: false, seekSec: offsetSec });
  }

  // This phone → Mac. Pause locally, ask the Mac to play the same replay from
  // the current offset; on refusal, stay paused.
  function beginPhoneToMac() {
    if (!phoneMeta?.file) return;
    audio.pause();
    const file = phoneMeta.file;
    const offsetSec = audio.currentTime || 0;
    lastPhonePauseAt = offsetSec;
    renderPlayer();
    postAction({ type: "play_replay", file, offsetSec }).then((r) => {
      if (r) clearLocalForHandoff();
      else toast("Mac is busy");
    });
  }

  /* ============================================================
     Arbitration: pause phone audio when mac-live begins
     ============================================================ */
  function enforceArbitration() {
    if (isMacLive() && phoneMeta && !audio.paused && !audio.ended) {
      lastPhonePauseAt = audio.currentTime || 0;
      audio.pause();
    }
  }

  /* ============================================================
     §3  Session cards
     ============================================================ */
  function replyBoxHtml(agent, ns) {
    const displayName = agent.label || agent.name;
    const injectable = isInjectable(agent);
    if (!injectable) return "";
    const draft = replyDrafts[agent.sessionId] || "";
    const open = openReplySession === agent.sessionId || ns === "exp";
    return `
      <div class="reply-box" data-reply-box="${escapeHtml(agent.sessionId)}"${open ? "" : " hidden"}>
        <textarea class="reply-input" data-reply-for="${escapeHtml(agent.sessionId)}"
          placeholder="Reply to ${escapeHtml(displayName)}…">${escapeHtml(draft)}</textarea>
        <div class="reply-actions">
          <button type="button" class="ghost" data-reply-cancel="${escapeHtml(agent.sessionId)}">Cancel</button>
          <button type="button" class="accent grow" data-reply-send="${escapeHtml(agent.sessionId)}">${iconHtml("send", "sm")} Send</button>
        </div>
      </div>`;
  }

  function renderMembers() {
    const focus = captureReplyFocus();
    const agents = visibleAgents();
    if (!agents.length) {
      members.innerHTML = `<div class="empty">No agents in the room</div>`;
      return;
    }
    members.innerHTML = agents
      .map((agent) => {
        const character = avatarDir(agent);
        const speaking = agent.state === "speaking";
        const frame = speaking ? "speaking" : "idle";
        const injectable = isInjectable(agent);
        const displayName = agent.label || agent.name;
        const rawName = agentRawName(agent);

        const stateBadge = speaking
          ? `<span class="badge speaking pulse">speaking</span>`
          : `<span class="badge ${escapeHtml(agent.state)}">${escapeHtml(
              String(agent.state).replace("_", " ")
            )}</span>`;

        const mutedChip = agent.muted ? `<span class="chip muted">muted</span>` : "";
        const queueChip =
          agent.raisedCount > 1
            ? `<span class="chip" title="Queued">${agent.raisedCount} queued</span>`
            : "";

        // §3 queued preview line (hand raised only; degrade if absent).
        let waiting = "";
        if (agent.state === "hand_raised" && agent.queuedPreview) {
          const qp = String(agent.queuedPreview);
          const trimmed = qp.length > 120 ? qp.slice(0, 120) + "…" : qp;
          waiting = `<div class="waiting">Waiting: <em>“${escapeHtml(trimmed)}”</em></div>`;
        }

        // Primary action by state.
        let primary = "";
        if (agent.state === "hand_raised") {
          const sub = outputPref === "phone" ? "on this phone" : "on Mac";
          primary = `<button type="button" class="accent grow read-update" data-grant="${escapeHtml(
            agent.sessionId
          )}">${iconHtml("play", "filled sm")} Read update<span class="sub">${sub}</span></button>`;
        } else if (!speaking) {
          primary = `<button type="button" class="ghost grow" data-replay="${escapeHtml(
            agent.sessionId
          )}">Replay last</button>`;
        }

        // Reply affordance.
        let reply;
        if (injectable) {
          reply = `<button type="button" class="ghost" data-reply-toggle="${escapeHtml(
            agent.sessionId
          )}">Reply</button>`;
        } else {
          reply = `<button type="button" class="ghost" data-reply-blocked="1">Reply</button>`;
        }

        const actions =
          primary || reply
            ? `<div class="card-actions">${primary}${reply}</div>`
            : "";
        const hint = injectable
          ? ""
          : `<div class="reply-hint">Reply off — not in team room. Respawn from ＋ to enable.</div>`;

        const hideBtn = rawName
          ? `<button type="button" class="btn-hide-dev" data-hide-dev="${escapeHtml(
              rawName
            )}" aria-label="Hide ${escapeHtml(displayName)}">Hide</button>`
          : "";

        return `
          <article class="card" data-session="${escapeHtml(agent.sessionId)}">
            <div class="row card-member-row">
              <div style="position:relative">
                <img class="avatar" src="${avatarSrc(character, frame)}" alt=""
                  onerror="this.onerror=null;this.src='${avatarSrc("default", frame)}'" />
                ${
                  agent.state === "hand_raised"
                    ? `<div style="position:absolute;right:-4px;top:-4px;font-size:1.1rem">✋</div>`
                    : ""
                }
              </div>
              <div class="meta">
                <p class="name">${escapeHtml(displayName)}</p>
                ${stateBadge}
                <div class="chips">${queueChip}${mutedChip}</div>
                ${waiting}
              </div>
              ${hideBtn}
            </div>
            ${actions}
            ${hint}
            ${replyBoxHtml(agent, "card")}
          </article>`;
      })
      .join("");
    restoreReplyFocus(focus);
  }

  /* --------------- reply focus preservation --------------- */
  function captureReplyFocus() {
    const el = document.activeElement;
    if (el && el.classList && el.classList.contains("reply-input")) {
      return {
        id: el.getAttribute("data-reply-for"),
        start: el.selectionStart,
        end: el.selectionEnd,
      };
    }
    return null;
  }
  function restoreReplyFocus(focus) {
    if (!focus || !focus.id) return;
    const ta = members.querySelector(
      `.reply-input[data-reply-for="${focus.id}"]`
    );
    if (ta) {
      ta.focus();
      try { ta.setSelectionRange(focus.start, focus.end); } catch { /* noop */ }
    }
  }

  /* ============================================================
     Reply send (§7)
     ============================================================ */
  async function sendReply(sessionId, textarea) {
    const text = String(textarea?.value || "").trim();
    const agent = agentForSession(sessionId);
    const name = agent ? agent.label || agent.name : "agent";
    if (!text) {
      toast("Type a reply first");
      return;
    }
    if (text.length > 4000) {
      toast("Reply too long");
      return;
    }
    const r = await postAction({ type: "reply", sessionId, text });
    const status = r ? r.status || "ok" : "failed";
    if (status === "ok") {
      toast(`Reply sent to ${name}`);
      delete replyDrafts[sessionId];
      openReplySession = null;
      textarea.value = "";
      renderMembers();
      renderExpandedChrome();
    } else if (status === "not_in_team") {
      toast("Not in team room — respawn from ＋");
    } else {
      toast("Reply failed");
    }
  }

  /* ============================================================
     Hidden devs (preserved)
     ============================================================ */
  function renderHiddenDevs() {
    const names = [...hiddenDevNames].sort((a, b) => a.localeCompare(b));
    const count = names.length;
    if (!count) {
      hiddenDevs.hidden = true;
      hiddenDevsList.hidden = true;
      hiddenDevsList.innerHTML = "";
      btnHiddenDevs.setAttribute("aria-expanded", "false");
      return;
    }
    hiddenDevs.hidden = false;
    btnHiddenDevs.textContent = count === 1 ? "1 hidden" : `${count} hidden`;
    hiddenDevsList.innerHTML = names
      .map((rawName) => {
        const agent = (snapshot.agents || []).find((a) => agentRawName(a) === rawName);
        let label = rawName;
        let sub = "";
        if (agent) {
          label = agent.label || agent.name || rawName;
          if (String(label) !== rawName) sub = rawName;
        }
        return `
          <div class="hidden-dev-row">
            <div class="hidden-dev-identity">
              <div class="hidden-dev-label">${escapeHtml(label)}</div>
              ${sub ? `<div class="hidden-dev-name">${escapeHtml(sub)}</div>` : ""}
            </div>
            <button type="button" class="btn-show-dev" data-show-dev="${escapeHtml(
              rawName
            )}" aria-label="Show ${escapeHtml(label)}">Show</button>
          </div>`;
      })
      .join("");
  }

  function memberCard(sessionId) {
    if (!sessionId) return null;
    return (
      [...members.querySelectorAll("[data-session]")].find(
        (el) => el.getAttribute("data-session") === sessionId
      ) || null
    );
  }

  function setDevHidden(rawName, hidden) {
    const name = String(rawName || "").trim();
    if (!name) return;
    if (hiddenDevNames.has(name) === hidden) return;
    const matchedAgent = (snapshot.agents || []).find((a) => agentRawName(a) === name);
    const displayName = matchedAgent?.label || matchedAgent?.name || name;
    if (hidden) hiddenDevNames.add(name);
    else hiddenDevNames.delete(name);
    if (!saveHiddenDevNames()) {
      if (hidden) hiddenDevNames.delete(name);
      else hiddenDevNames.add(name);
      return;
    }
    if (hidden) {
      if (phoneMeta && entryRawName(phoneMeta) === name) {
        clearPhonePlayback();
      } else if (catchUpMode) {
        catchUpQueue = catchUpQueue.filter((e) => !isReplayEntryHidden(e));
      }
    }
    applyReplayVisibility();
    knownFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
    render();
    toast(hidden ? `Hidden ${displayName}` : `Showing ${displayName}`);
    if (hidden) {
      if (!hiddenDevs.hidden) btnHiddenDevs.focus();
    } else {
      const card = memberCard(matchedAgent?.sessionId);
      if (card) {
        card.setAttribute("tabindex", "-1");
        card.focus();
      } else if (!hiddenDevs.hidden) {
        btnHiddenDevs.focus();
      }
    }
  }

  /* ============================================================
     §5  Messages
     ============================================================ */
  function unheardCount() {
    return (replayList || []).filter(
      (e) => e.file && !listened.has(e.file) && e.kind !== "ack"
    ).length;
  }

  function updateBars() {
    const n = unheardCount();
    // Catch up moved to the ⋮ overflow menu (§C5).
    if (catchUpMode) {
      miCatchup.hidden = false;
      miCatchup.textContent = "Stop catch-up";
    } else if (n > 0) {
      miCatchup.hidden = false;
      miCatchup.textContent = `Catch up (${n} unheard)`;
    } else {
      miCatchup.hidden = true;
    }
    btnClear.style.display = replayList.length ? "" : "none";
  }

  function renderMessages() {
    if (!replayList.length) {
      messagesEl.innerHTML = `<div class="empty">No messages yet</div>`;
      updateBars();
      return;
    }
    messagesEl.innerHTML = replayList
      .map((entry, i) => {
        const character = entryCharacter(entry);
        const name = entryName(entry);
        const preview = entryPreview(entry);
        const ago = timeAgo(entry.timestamp);
        const heard = listened.has(entry.file);
        const playing = i === currentIndex && phoneMeta && !phonePendingTap;
        return `
          <button type="button" class="msg-row${playing ? " playing" : ""}" data-msg-idx="${i}">
            <img class="avatar sm" src="${avatarSrc(character, "idle")}" alt=""
              onerror="this.onerror=null;this.src='${avatarSrc("default", "idle")}'" />
            <div class="msg-body">
              <div class="msg-top">
                <span class="msg-name">${escapeHtml(name)}</span>
                <span class="msg-ago">${escapeHtml(ago)}</span>
              </div>
              <div class="msg-preview">${escapeHtml(preview)}</div>
            </div>
            <span class="unheard${heard ? " hidden" : ""}" aria-label="unheard"></span>
          </button>`;
      })
      .join("");
    updateBars();
  }

  function clearMessages() {
    if (!replayList.length) return;
    let changed = false;
    for (const e of replayList) {
      if (!e.file) continue;
      if (!listened.has(e.file)) { listened.add(e.file); changed = true; }
      if (!clearedFiles.has(e.file)) { clearedFiles.add(e.file); changed = true; }
    }
    if (changed) {
      saveStrSet(LISTENED_KEY, listened);
      saveStrSet(CLEARED_KEY, clearedFiles);
    }
    stopCatchUp();
    applyReplayVisibility();
    knownFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
    renderMessages();
    updateBars();
    toast("Messages cleared");
  }

  /* ============================================================
     Catch-up (preserved)
     ============================================================ */
  function stopCatchUp() {
    catchUpMode = false;
    catchUpQueue = [];
    updateBars();
  }
  async function startCatchUp() {
    if (isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    const unheard = [...replayList]
      .filter((e) => e.file && !listened.has(e.file) && e.kind !== "ack")
      .reverse();
    if (!unheard.length) {
      toast("Nothing to catch up");
      return;
    }
    catchUpMode = true;
    catchUpQueue = unheard;
    updateBars();
    const next = catchUpQueue.shift();
    await playReplayEntry(next, { fromCatchUp: true });
  }
  async function onTrackEnded() {
    if (phoneMeta?.file) markListened(phoneMeta.file);
    if (catchUpMode) catchUpQueue = catchUpQueue.filter((e) => !isReplayEntryHidden(e));
    if (catchUpMode && catchUpQueue.length && !isMacLive()) {
      const next = catchUpQueue.shift();
      await playReplayEntry(next, { fromCatchUp: true });
      return;
    }
    if (catchUpMode) stopCatchUp();
    renderPlayer();
    renderMessages();
  }

  /* ============================================================
     Replay list fetch / visibility
     ============================================================ */
  async function fetchReplayList() {
    const res = await fetch("/replay-list");
    if (!res.ok) throw new Error("replay-list failed");
    return await res.json();
  }
  function applyReplayVisibility() {
    replayList = allReplayList.filter(
      (entry) => !isReplayEntryHidden(entry) && !clearedFiles.has(entry.file)
    );
    if (phoneMeta?.file) {
      currentIndex = replayList.findIndex((e) => e.file === phoneMeta.file);
    } else {
      currentIndex = -1;
    }
    const visibleFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
    catchUpQueue = catchUpQueue.filter((e) => e.file && visibleFiles.has(e.file));
    if (pendingNewEntry && !visibleFiles.has(pendingNewEntry.file)) {
      pendingNewEntry = null;
      newPill.classList.remove("on");
    }
  }
  async function refreshReplayList({ detectNew } = {}) {
    try {
      const list = await fetchReplayList();
      const prevKnown = knownFiles;
      pruneAgainst(listened, LISTENED_KEY, list);
      pruneAgainst(clearedFiles, CLEARED_KEY, list);
      allReplayList = Array.isArray(list) ? list : [];
      applyReplayVisibility();
      const newFiles = replayList.filter((e) => e.file && !prevKnown.has(e.file));
      knownFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
      if (detectNew && newFiles.length && isPhoneIdle() && !isMacLive()) {
        pendingNewEntry = newFiles[0];
        newPill.classList.add("on");
      }
      renderMessages();
      renderPlayer();
    } catch {
      /* keep prior list */
    }
  }

  /* ============================================================
     §4  Header render + §6 picker helpers
     ============================================================ */
  function renderHeader() {
    heldPill.hidden = !snapshot.roomHeld;
    $("mi-hold").textContent = snapshot.roomHeld ? "Release room" : "Hold room";
    renderHeaderDevice();
  }

  function render() {
    renderHeader();
    renderMembers();
    renderHiddenDevs();
    renderMessages();
    enforceArbitration();
    renderPlayer();
  }

  /* ============================================================
     Karaoke / progress tick
     ============================================================ */
  function tick() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      updateExpandedKaraoke();
      updatePlayerProgress();
      renderMiniChrome();
    } else if (ps.kind === "phone-replay" && !audio.paused && !phonePendingTap) {
      updateExpandedKaraoke();
      updatePlayerProgress();
      checkListenedProgress();
    }
  }

  function checkListenedProgress() {
    if (!phoneMeta?.file) return;
    const dur = trackDurationSec();
    const cur = audio.currentTime || 0;
    if (dur > 0 && cur / dur >= 0.8) markListened(phoneMeta.file);
  }

  /* ============================================================
     §6  Session picker
     ============================================================ */
  let pickerData = null;
  let pickerTab = "new";
  let pickerPersona = null;

  async function openPicker() {
    picker.hidden = false;
    pickerBackdrop.hidden = false;
    document.body.classList.add("picker-open"); // lock background scroll (§C6)
    requestAnimationFrame(() => picker.classList.add("open"));
    pickerList.innerHTML = `<div class="empty">Loading…</div>`;
    pickerPersonas.innerHTML = "";
    try {
      const res = await fetch("/picker");
      if (!res.ok) throw new Error("no picker");
      pickerData = await res.json();
    } catch {
      pickerData = null;
      pickerList.innerHTML = `<div class="empty">Session picker unavailable</div>`;
      return;
    }
    const personas = Array.isArray(pickerData.personas) ? pickerData.personas : [];
    pickerPersona = personas.length ? personas[0] : null;
    renderPicker();
  }
  function closePicker() {
    picker.classList.remove("open");
    pickerBackdrop.hidden = true;
    document.body.classList.remove("picker-open");
    setTimeout(() => { picker.hidden = true; }, 260);
  }
  function renderPicker() {
    if (!pickerData) return;
    const personas = Array.isArray(pickerData.personas) ? pickerData.personas : [];
    pickerPersonas.innerHTML = personas.length
      ? personas
          .map((p) => {
            const char = String(p).toLowerCase();
            return `<button type="button" class="persona-chip${
              p === pickerPersona ? " active" : ""
            }" data-persona="${escapeHtml(p)}">` +
              `<img class="persona-avatar" src="${avatarSrc(char, "idle")}" alt="" ` +
              `onerror="this.onerror=null;this.src='${avatarSrc("default", "idle")}'" />` +
              `<span class="persona-cap">${escapeHtml(p)}</span></button>`;
          })
          .join("")
      : `<span class="chip">default</span>`;

    for (const t of picker.querySelectorAll(".tab")) {
      t.classList.toggle("active", t.getAttribute("data-tab") === pickerTab);
    }

    if (pickerTab === "new") {
      const dirs = Array.isArray(pickerData.dirs) ? pickerData.dirs : [];
      const spawnRow = (dir, label) =>
        `<button type="button" class="picker-row" data-spawn-dir="${escapeHtml(
          dir
        )}"><div class="picker-row-label">${escapeHtml(
          label
        )}</div><div class="picker-row-sub">${escapeHtml(dir)}</div></button>`;
      let html = dirs.length
        ? dirs
            .map((d) => {
              const dir = typeof d === "string" ? d : d?.dir || d?.path || "";
              const label =
                (typeof d === "object" && (d.label || d.name)) ||
                dir.split("/").filter(Boolean).pop() ||
                dir;
              return spawnRow(dir, label);
            })
            .join("")
        : `<div class="empty">No known directories</div>`;
      // All projects — every dir under ~/projects (§C6). Degrades if absent.
      const projectsDirs = Array.isArray(pickerData.projectsDirs)
        ? pickerData.projectsDirs
        : [];
      if (projectsDirs.length) {
        html += `<div class="picker-section-label">All projects</div>`;
        html += projectsDirs
          .map((p) => {
            const dir = p?.dir || "";
            const label = p?.name || dir.split("/").filter(Boolean).pop() || dir;
            return dir ? spawnRow(dir, label) : "";
          })
          .join("");
      }
      pickerList.innerHTML = html;
    } else {
      const rs = Array.isArray(pickerData.resumable) ? pickerData.resumable : [];
      pickerList.innerHTML = rs.length
        ? rs
            .map((r) => {
              const sid = r?.sessionId || r?.id || "";
              const dir = r?.dir || r?.path || "";
              const label = r?.label || r?.name || dir.split("/").filter(Boolean).pop() || sid.slice(0, 8);
              return `<button type="button" class="picker-row" data-resume-id="${escapeHtml(
                sid
              )}" data-resume-dir="${escapeHtml(dir)}"><div class="picker-row-label">${escapeHtml(
                label
              )}</div><div class="picker-row-sub">${escapeHtml(dir)}</div></button>`;
            })
            .join("")
        : `<div class="empty">No resumable sessions</div>`;
    }
  }

  /* ============================================================
     Event wiring
     ============================================================ */
  // Members (cards) — delegated.
  members.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const hideBtn = t.closest("[data-hide-dev]");
    if (hideBtn) { setDevHidden(hideBtn.getAttribute("data-hide-dev"), true); return; }

    const grantEl = t.closest("[data-grant]");
    if (grantEl) {
      const sessionId = grantEl.getAttribute("data-grant");
      const toPhone = outputPref === "phone";
      if (toPhone) primeAudio();
      postAction({ type: "grant", sessionId, output: toPhone ? "phone" : "mac" }).then((r) => {
        if (r) toast(toPhone ? "Reading on this phone…" : "Reading on Mac…");
        else toast("Couldn't start — another update may be playing");
      });
      return;
    }

    const replayEl = t.closest("[data-replay]");
    if (replayEl) {
      const agent = agentForSession(replayEl.getAttribute("data-replay"));
      if (agent) replayForAgent(agent);
      return;
    }

    const blocked = t.closest("[data-reply-blocked]");
    if (blocked) { toast("Not in team room — respawn from ＋ to enable"); return; }

    const replyToggle = t.closest("[data-reply-toggle]");
    if (replyToggle) {
      const id = replyToggle.getAttribute("data-reply-toggle");
      openReplySession = openReplySession === id ? null : id;
      renderMembers();
      if (openReplySession) {
        const ta = members.querySelector(`.reply-input[data-reply-for="${id}"]`);
        if (ta) ta.focus();
      }
      return;
    }

    const cancel = t.closest("[data-reply-cancel]");
    if (cancel) {
      const id = cancel.getAttribute("data-reply-cancel");
      delete replyDrafts[id];
      if (openReplySession === id) openReplySession = null;
      renderMembers();
      return;
    }

    const send = t.closest("[data-reply-send]");
    if (send) {
      const id = send.getAttribute("data-reply-send");
      const box = send.closest(".reply-box");
      const ta = box ? box.querySelector(".reply-input") : null;
      if (ta) sendReply(id, ta);
      return;
    }
  });

  // Persist reply drafts as the owner types (survives re-render).
  members.addEventListener("input", (ev) => {
    const t = ev.target;
    if (t instanceof HTMLElement && t.classList.contains("reply-input")) {
      const id = t.getAttribute("data-reply-for");
      if (id) replyDrafts[id] = t.value;
    }
  });

  // Expanded reply box (static wrapper).
  expReplyWrap.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const send = t.closest("[data-reply-send]");
    if (send) {
      const id = send.getAttribute("data-reply-send");
      const box = send.closest(".reply-box");
      const ta = box ? box.querySelector(".reply-input") : null;
      if (ta) sendReply(id, ta);
      return;
    }
    const cancel = t.closest("[data-reply-cancel]");
    if (cancel) {
      const box = cancel.closest(".reply-box");
      const ta = box ? box.querySelector(".reply-input") : null;
      if (ta) ta.value = "";
    }
  });
  expReplyWrap.addEventListener("input", (ev) => {
    const t = ev.target;
    if (t instanceof HTMLElement && t.classList.contains("reply-input")) {
      const id = t.getAttribute("data-reply-for");
      if (id) replyDrafts[id] = t.value;
    }
  });

  btnHiddenDevs.addEventListener("click", () => {
    const expanded = btnHiddenDevs.getAttribute("aria-expanded") === "true";
    const next = !expanded;
    btnHiddenDevs.setAttribute("aria-expanded", String(next));
    hiddenDevsList.hidden = !next;
  });
  hiddenDevsList.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const btn = t.closest("[data-show-dev]");
    if (!btn) return;
    setDevHidden(btn.getAttribute("data-show-dev"), false);
  });

  messagesEl.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const row = t.closest("[data-msg-idx]");
    if (!row) return;
    const idx = Number(row.getAttribute("data-msg-idx"));
    if (Number.isFinite(idx)) playAtIndex(idx);
  });

  // Header: overflow, new, held pill.
  $("btn-overflow").addEventListener("click", (ev) => {
    ev.stopPropagation();
    if (overflowMenu.hidden) {
      const r = $("btn-overflow").getBoundingClientRect();
      overflowMenu.style.top = `${r.bottom + 6}px`;
      overflowMenu.style.right = `${window.innerWidth - r.right}px`;
      overflowMenu.hidden = false;
    } else {
      overflowMenu.hidden = true;
    }
  });
  $("mi-hold").addEventListener("click", async () => {
    overflowMenu.hidden = true;
    const wasHeld = !!snapshot.roomHeld;
    const ok = await postAction({ type: "hold_room" });
    if (ok) toast(wasHeld ? "Room released" : "Room held");
  });
  heldPill.addEventListener("click", async () => {
    const ok = await postAction({ type: "hold_room" });
    if (ok) toast("Room released");
  });
  $("btn-new").addEventListener("click", () => openPicker());

  // Close popovers on outside click.
  document.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!overflowMenu.hidden && t instanceof HTMLElement &&
        !overflowMenu.contains(t) && t.id !== "btn-overflow") {
      overflowMenu.hidden = true;
    }
  });

  // Catch up — lives in the ⋮ overflow menu now (§C5).
  miCatchup.addEventListener("click", () => {
    overflowMenu.hidden = true;
    if (catchUpMode) {
      stopCatchUp();
      audio.pause();
      renderPlayer();
      return;
    }
    startCatchUp();
  });

  // Clear → inline confirm (§C5).
  function showClearConfirm() {
    clearConfirm.hidden = false;
    btnClear.style.display = "none";
  }
  function hideClearConfirm() {
    clearConfirm.hidden = true;
    updateBars(); // restores the Clear button when there are messages
  }
  btnClear.addEventListener("click", () => showClearConfirm());
  $("btn-clear-confirm").addEventListener("click", () => {
    clearMessages();
    hideClearConfirm();
  });
  $("btn-clear-cancel").addEventListener("click", () => hideClearConfirm());

  // Mini player.
  miniPp.addEventListener("click", (ev) => { ev.stopPropagation(); transportPlayPause(); });
  $("mini-tap").addEventListener("click", () => openExpanded());

  // Expanded controls.
  btnPp.addEventListener("click", () => transportPlayPause());
  btnStop.addEventListener("click", () => transportStop());
  btnPrev.addEventListener("click", () => {
    if (currentIndex > 0) playAtIndex(currentIndex - 1);
  });
  btnNext.addEventListener("click", () => {
    if (currentIndex >= 0 && currentIndex < replayList.length - 1) {
      playAtIndex(currentIndex + 1);
    }
  });
  btnRestart.addEventListener("click", () => restartTrack());
  $("exp-collapse").addEventListener("click", () => closeExpanded());

  // Transcript | Message tab toggle (§C3).
  expTabs.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const tab = t.closest("[data-exptab]");
    if (!tab) return;
    expTab = tab.getAttribute("data-exptab");
    renderExpandedContent();
  });

  // Header device toggle (§A1): output preference before playback.
  headerDevice.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const seg = t.closest("[data-device]");
    if (seg) setOutput(seg.getAttribute("data-device"));
  });

  // Expanded device row (§A2/A3): live handoff when a track is loaded,
  // otherwise a preference mirror.
  expDeviceRow.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const seg = t.closest("[data-device]");
    if (!seg) return;
    const dev = seg.getAttribute("data-device");
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      if (dev === "phone") beginMacToPhone();
      return; // tapping the current source is a no-op
    }
    if (ps.kind === "phone-replay") {
      if (dev === "mac") beginPhoneToMac();
      return;
    }
    setOutput(dev); // no track loaded — just the preference toggle
  });

  // Progress seek (phone-replay only).
  $("progress").addEventListener("click", (ev) => {
    if (computePlayerState().kind !== "phone-replay") return;
    const dur = trackDurationSec();
    if (dur <= 0) return;
    const rect = $("progress").getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (ev.clientX - rect.left) / rect.width));
    try { audio.currentTime = frac * dur; } catch { /* not seekable yet */ }
    updatePlayerProgress();
    checkListenedProgress();
  });

  // Swipe-down to collapse expanded.
  let touchStartY = null;
  expanded.addEventListener("touchstart", (ev) => {
    if (expanded.scrollTop > 0) { touchStartY = null; return; }
    touchStartY = ev.touches[0].clientY;
  }, { passive: true });
  expanded.addEventListener("touchmove", (ev) => {
    if (touchStartY === null) return;
    const dy = ev.touches[0].clientY - touchStartY;
    if (dy > 0) expanded.style.transform = `translateY(${Math.min(dy, 400)}px)`;
  }, { passive: true });
  expanded.addEventListener("touchend", (ev) => {
    if (touchStartY === null) return;
    const dy = (ev.changedTouches[0]?.clientY || touchStartY) - touchStartY;
    expanded.style.transform = "";
    if (dy > 90) closeExpanded();
    touchStartY = null;
  });

  newPill.addEventListener("click", () => {
    if (pendingNewEntry) playReplayEntry(pendingNewEntry);
  });

  // Audio element events.
  audio.addEventListener("ended", () => onTrackEnded());
  audio.addEventListener("play", () => renderPlayer());
  audio.addEventListener("pause", () => renderPlayer());
  audio.addEventListener("timeupdate", () => {
    updatePlayerProgress();
    checkListenedProgress();
  });
  audio.addEventListener("loadedmetadata", () => {
    // Apply a pending handoff seek once the file's duration is known.
    if (pendingSeekSec > 0) {
      const target = pendingSeekSec;
      pendingSeekSec = 0;
      const dur = audio.duration;
      const clamped = Number.isFinite(dur) && dur > 0 ? Math.min(target, dur - 0.1) : target;
      try { audio.currentTime = Math.max(0, clamped); } catch { /* not seekable */ }
    }
    updatePlayerProgress();
  });

  // Picker wiring.
  pickerBackdrop.addEventListener("click", () => closePicker());
  picker.addEventListener("click", (ev) => {
    const t = ev.target;
    if (!(t instanceof HTMLElement)) return;
    const tab = t.closest("[data-tab]");
    if (tab) { pickerTab = tab.getAttribute("data-tab"); renderPicker(); return; }
    const persona = t.closest("[data-persona]");
    if (persona) { pickerPersona = persona.getAttribute("data-persona"); renderPicker(); return; }
    const spawn = t.closest("[data-spawn-dir]");
    if (spawn) {
      const dir = spawn.getAttribute("data-spawn-dir");
      const body = { type: "spawn_session", dir };
      if (pickerPersona) body.persona = pickerPersona;
      postAction(body).then((r) => {
        toast(r ? "Starting session…" : "Couldn't start session");
      });
      closePicker();
      return;
    }
    const resume = t.closest("[data-resume-id]");
    if (resume) {
      const sessionId = resume.getAttribute("data-resume-id");
      const dir = resume.getAttribute("data-resume-dir");
      const body = { type: "resume_session", sessionId, dir };
      if (pickerPersona) body.persona = pickerPersona;
      postAction(body).then((r) => {
        toast(r ? "Resuming session…" : "Couldn't resume session");
      });
      closePicker();
      return;
    }
  });

  /* ============================================================
     SSE
     ============================================================ */
  function nowPlayingKey(np) {
    if (!np) return null;
    return `${np.sessionId || ""}|${np.startedAt || ""}|${(np.text || "").slice(0, 40)}`;
  }

  function connectSse() {
    const es = new EventSource("/events");
    es.onopen = () => conn.classList.add("live");
    es.onerror = () => conn.classList.remove("live");
    es.onmessage = (ev) => {
      try {
        const next = JSON.parse(ev.data);
        const prevKey = lastNowPlayingKey;
        const nextKey = nowPlayingKey(next.nowPlaying);
        snapshot = next;
        render();
        // Live handoff (§A3): fires on the endedAt+replayFile frame, which
        // does NOT change nowPlayingKey — check it every frame.
        if (handoffAwait) checkMacToPhoneHandoff();
        if (nextKey && nextKey !== prevKey) {
          lastNowPlayingKey = nextKey;
          refreshReplayList({ detectNew: true });
          // Grant-to-phone: play exactly replayFile when routed to the phone.
          // Fired once per new now-playing to avoid restart on repeat frames.
          const np = next.nowPlaying;
          if (isNowPlayingActive(np) && np.output === "phone" && np.replayFile) {
            maybePlayGrantToPhone(np);
          }
        } else if (!nextKey) {
          lastNowPlayingKey = null;
        }
      } catch { /* ignore */ }
    };
  }

  async function boot() {
    try {
      const [snapRes, charsRes] = await Promise.all([
        fetch("/snapshot"),
        fetch("/characters"),
      ]);
      if (snapRes.ok) snapshot = await snapRes.json();
      if (charsRes.ok) charactersPayload = await charsRes.json();
    } catch { /* SSE fills in */ }
    lastNowPlayingKey = nowPlayingKey(snapshot.nowPlaying);
    try { await refreshReplayList(); } catch { /* empty until later */ }
    render();
    // If we boot into an active phone-routed grant, pick it up.
    const np = snapshot.nowPlaying;
    if (isNowPlayingActive(np) && np.output === "phone" && np.replayFile) {
      maybePlayGrantToPhone(np);
    }
    connectSse();
    karaokeTimer = setInterval(tick, 80);
  }

  boot();
})();
  </script>
</body>
</html>
