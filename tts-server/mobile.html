    const items = [...(threadCache[agent.sessionId]?.items || [])];
    const acks = ackEvents[agent.sessionId] || [];
    for (const a of acks) {
      items.push({ role: "user", text: "", at: a.at, _ack: true });
    }
    items.sort((a, b) => {
      const ta = Date.parse(a.at) || 0;
      const tb = Date.parse(b.at) || 0;
      return ta - tb;
    });

    let html = items.map((i) => threadBubbleHtml(i, agent, liveOn)).join("");
    if (working && !liveOn) {
      html += `<div class="cv-working"><div>${escapeHtml(name)} is working<span class="cv-dots"><i>.</i><i>.</i><i>.</i></span></div><div class="cv-hint">tap Go live to listen in while they work</div></div>`;
    }

    const sig = `${agent.sessionId}|${liveOn}|${working}|${items.length}|${acks.length}|${n}|${html.length}`;
    if (sig !== lastThreadSig) {
      lastThreadSig = sig;
      const nearBottom =
        expThread.scrollHeight - expThread.scrollTop - expThread.clientHeight < 80;
      expThread.innerHTML = html;
      if (nearBottom) expThread.scrollTop = expThread.scrollHeight;
    }
  }

  function endLive(agent) {
    if (!agent) return;
    // Stop phone audio first, then leave live, then slide to chat.
    clearPhonePlayback({ keepSheet: true });
    callViewOpen = false;
    liveStartedAt = null;
    liveClipCounts[agent.sessionId] = 0;
    lastCardSig = null;
    expanded.classList.remove("show-call");
    postAction({ type: "set_live", sessionId: agent.sessionId, on: false }).then((r) => {
      if (!r) toast("Couldn't end live");
    });
    toast("Live ended");
    renderPlayer();
  }

  function goLive(agent) {
    if (!agent) return;
    primeAudio();
    try { ackAudio.src = SILENT_WAV; ackAudio.play().catch(() => {}); } catch { /* noop */ }
    liveClipCounts[agent.sessionId] = 0;
    liveStartedAt = Date.now();
    callViewOpen = true;
    lastCardSig = null;
    postAction({ type: "set_live", sessionId: agent.sessionId, on: true }).then((r) => {
      if (!r) {
        toast("Couldn't toggle live");
        callViewOpen = false;
        liveStartedAt = null;
      }
      renderPlayer();
    });
    toast("Going live — intermediates will be spoken");
    renderPlayer();
  }

  let ackFlash = null; // { sessionId, until } — brief call-card beat on ack
  function handlePhoneAckFrame(ack) {
    if (!ack || !ack.at || ack.at === lastAckAt) return;
    lastAckAt = ack.at;
    ackFlash = { sessionId: ack.sessionId, until: Date.now() + 4000 };
    const list = ackEvents[ack.sessionId] || (ackEvents[ack.sessionId] = []);
    list.push({ at: ack.at });
    if (ack.ackFile) {
      try {
        ackAudio.src = `/phrase-audio/${ack.ackFile.split("/").map(encodeURIComponent).join("/")}`;
        ackAudio.play().catch(() => {});
      } catch { /* chip only */ }
    }
    lastThreadSig = null;
    renderPlayer();
  }

  function updatePlayerProgress() {
    if (macScrubbing) return; // drag preview owns the fill until release
    const ps = computePlayerState();
    let cur = 0;
    let dur = 0;
    if (ps.kind === "mac-live") {
      dur = macDurationMs(ps.nowPlaying) / 1000;
      cur = Math.min(dur, macElapsedMs(ps.nowPlaying) / 1000);
    } else if (ps.kind === "mac-paused") {
      dur = macDurationMs(ps.nowPlaying) / 1000;
      cur = Math.min(dur, ps.offsetSec);
    } else if (ps.kind === "phone-replay") {
      dur = trackDurationSec();
      cur = (liveMode ? liveBaseSec : 0) + (audio.currentTime || 0);
      if (dur > 0) cur = Math.min(dur, cur);
    }
    const pct = dur > 0 ? Math.min(100, (cur / dur) * 100) : 0;
    progressFill.style.width = `${pct}%`;
    miniProgressFill.style.width = `${pct}%`;
    $("time-elapsed").textContent = fmtTime(cur);
    $("time-total").textContent = dur > 0 ? fmtTime(dur) : "0:00";
    $("progress").setAttribute("aria-valuenow", String(Math.round(pct)));
  }

  function updateExpandedKaraoke() {
    if (!expanded.classList.contains("open")) return;
    // Conversation view: karaoke lives in the playback strip + call card.
    if (expanded.classList.contains("convo")) {
      updateStripKaraoke();
      const callEl = document.getElementById("cv-call-karaoke");
      if (callEl) {
        const psc = computePlayerState();
        if (psc.kind === "phone-replay") {
          const e = psc.entry;
          const elapsed = ((liveMode ? liveBaseSec : 0) + (audio.currentTime || 0)) * 1000;
          callEl.innerHTML = karaokeFromAlignment(
            e.spokenText || e.textPreview || "",
            e.alignment,
            elapsed
          );
          // The card body is height-capped — keep the spoken word in view.
          const on = callEl.querySelector(".w.on");
          if (on) {
            try { on.scrollIntoView({ block: "nearest" }); } catch { /* noop */ }
          }
        }
      }
      // Keep live timers ticking.
      const elapsed = fmtLiveElapsed();
      if (cvCallTimer) cvCallTimer.textContent = elapsed;
      if (cvPinTimer) cvPinTimer.textContent = elapsed;
      return;
    }
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      const np = ps.nowPlaying;
      expKaraoke.innerHTML = karaokeFromAlignment(np.text, np.alignment, macElapsedMs(np));
    } else if (ps.kind === "mac-paused") {
      const np = ps.nowPlaying;
      expKaraoke.innerHTML = karaokeFromAlignment(np.text, np.alignment, ps.offsetSec * 1000);
    } else if (ps.kind === "phone-replay") {
      const e = ps.entry;
      const elapsed = ((liveMode ? liveBaseSec : 0) + (audio.currentTime || 0)) * 1000;
      const text = e.spokenText || e.textPreview || "";
      expKaraoke.innerHTML = karaokeFromAlignment(text, e.alignment, elapsed);
    } else {
      expKaraoke.innerHTML = "";
    }
  }

  function renderPlayer() {
    renderMiniChrome();
    renderExpandedChrome();
  }

  function openExpanded(convoSessionId) {
    if (convoSessionId) convoOverride = convoSessionId;
    if (!playerSubject() && !convoAgent()) return;
    expanded.classList.add("open");
    expanded.setAttribute("aria-hidden", "false");
    const agent = convoAgent();
    if (agent) {
      fetchThread(agent.sessionId);
      if (agent.live?.on) {
        if (!liveStartedAt) liveStartedAt = Date.now();
        // Fresh open onto a live session → call surface.
        if (convoSessionId) callViewOpen = true;
      } else {
        callViewOpen = false;
      }
    }
    renderExpandedChrome();
  }
  function closeExpanded() {
    convoOverride = null;
    lastThreadSig = null;
    lastCardSig = null;
    lastComposerSession = null;
    callViewOpen = false;
    expanded.classList.remove("open", "convo", "live-on", "show-call");
    expanded.setAttribute("aria-hidden", "true");
  }

  /* ============================================================
     Transport (follows playerState.kind — §0)
     ============================================================ */
  // Mac pause via stop-and-remember (no SIGSTOP stutter). Falls back to the
  // legacy pause toggle only in the first seconds before replayFile exists.
  function macPause(np) {
    macActionPending = true;
    macPaused = {
      file: np.replayFile,
      offsetSec: macElapsedMs(np) / 1000,
      np,
    };
    renderPlayer();
    postAction({ type: "stop" }).then((r) => {
      macActionPending = false;
      if (!r) {
        macPaused = null;
        toast("Couldn't pause");
      }
      renderPlayer();
    });
  }

  // play_replay right after a stop can 400 while the old player's lock is
  // still releasing (stop returns when the script SPAWNS, not when the kill
  // lands). Retry briefly instead of surfacing a bogus "Mac is busy".
  async function postPlayReplayRetrying(file, offsetSec, tries = 6) {
    for (let i = 0; i < tries; i++) {
      const r = await postAction({ type: "play_replay", file, offsetSec });
      if (r) return true;
      await new Promise((res) => setTimeout(res, 400));
    }
    return false;
  }

  function macResume() {
    if (!macPaused || macActionPending) return;
    macActionPending = true;
    const { file, offsetSec } = macPaused;
    renderPlayer();
    postPlayReplayRetrying(file, offsetSec).then((ok) => {
      macActionPending = false;
      if (ok) macPaused = null;
      else toast("Mac is busy");
      renderPlayer();
    });
  }

  function macSeek(targetSec) {
    const ps = computePlayerState();
    if (ps.kind === "mac-paused") {
      macPaused.offsetSec = Math.max(0, targetSec);
      renderPlayer();
      return;
    }
    if (ps.kind !== "mac-live") return;
    const np = ps.nowPlaying;
    if (!np.replayFile) {
      toast("Seek available in a moment");
      return;
    }
    if (macActionPending) return;
    macActionPending = true;
    macPaused = { file: np.replayFile, offsetSec: Math.max(0, targetSec), np };
    renderPlayer();
    postAction({ type: "stop" }).then((r) => {
      if (!r) {
        macActionPending = false;
        macPaused = null;
        toast("Couldn't seek");
        renderPlayer();
        return;
      }
      postPlayReplayRetrying(
        np.replayFile,
        macPaused ? macPaused.offsetSec : targetSec
      ).then((ok) => {
        macActionPending = false;
        if (ok) macPaused = null;
        else toast("Mac is busy");
        renderPlayer();
      });
    });
  }

  async function transportPlayPause() {
    if (macActionPending || phoneLoading) return;
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      const np = ps.nowPlaying;
      if (np.replayFile) {
        macPause(np);
        return;
      }
      // Replay not saved yet (first seconds) — legacy SIGSTOP toggle.
      const wasPaused = !!snapshot.paused;
      const ok = await postAction({ type: "pause" });
      if (ok) toast(wasPaused ? "Mac playback resumed" : "Mac playback paused");
      return;
    }
    if (ps.kind === "mac-paused") {
      macResume();
      return;
    }
    if (ps.kind === "phone-replay") {
      if (phonePendingTap) {
        phonePendingTap = false;
        try {
          audio.muted = false;
          await audio.play();
        } catch {
          phonePendingTap = true;
          toast("Tap again to play");
        }
        renderPlayer();
        return;
      }
      // Strict toggle — NEVER reload the source (§C4; live-mode reconnects are
      // the one exception). Resuming a paused track continues from currentTime;
      // only an already-ended track rewinds to 0.
      if (audio.paused) {
        if (liveMode && liveComplete) {
          // Paused mid-live and synthesis finished meanwhile — resume on the
          // seekable static file at the same overall position.
          switchLiveToStatic(liveBaseSec + (audio.currentTime || 0));
          return;
        }
        if (audio.ended) {
          try { audio.currentTime = 0; } catch { /* not seekable */ }
        }
        try { await audio.play(); } catch { toast("Tap again to play"); }
      } else {
        audio.pause();
      }
      renderPlayer();
      return;
    }
    // none → play latest replay
    playLatest();
  }

  // Speed cycle (v2.3, replaces the restart button — scrub-to-0 covers it).
  function fmtSpeed(v) {
    return `${String(v).replace(/^0/, "")}×`;
  }
  function updateSpeedLabel() {
    const label = btnSpeed.querySelector(".speed-label");
    if (label) label.textContent = fmtSpeed(speedMult);
  }
  // Applies in live mode too: EL synthesis outpaces realtime, so playback just
  // trails the growing edge; catching it is a normal buffer underrun (browser
  // auto-resumes when bytes arrive, watchdog covers dead connections).
  function applySpeed() {
    const base =
      phoneMeta?.playbackRate && phoneMeta.playbackRate > 0
        ? phoneMeta.playbackRate
        : 1;
    audio.playbackRate = base * speedMult;
  }
  function cycleSpeed() {
    const i = SPEED_STEPS.indexOf(speedMult);
    speedMult = SPEED_STEPS[(i + 1) % SPEED_STEPS.length];
    try { localStorage.setItem(SPEED_KEY, String(speedMult)); } catch {}
    updateSpeedLabel();
    applySpeed();
  }

  async function transportStop() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      const ok = await postAction({ type: "stop" });
      if (ok) toast("Mac playback stopped");
      return;
    }
    if (ps.kind === "mac-paused") {
      macPaused = null;
      macActionPending = false;
      renderPlayer();
      return;
    }
    clearPhonePlayback();
    renderPlayer();
  }

  /* ============================================================
     §1  Phone playback + priming
     ============================================================ */
  function primeAudio() {
    // Unlock <audio> inside a user gesture so a later SSE-driven play() works.
    if (audioUnlocked) return;
    // An element that's actively playing is already unlocked — replacing its
    // src with the silent primer would kill the in-progress replay.
    if (phoneMeta && audio.src && !audio.paused && !audio.ended) {
      audioUnlocked = true;
      return;
    }
    try {
      audio.muted = true;
      audio.src = SILENT_WAV;
      const p = audio.play();
      if (p && p.then) {
        p.then(() => {
          audio.pause();
          audio.muted = false;
          audioUnlocked = true;
        }).catch(() => {
          audio.muted = false;
        });
      }
    } catch { /* ignore */ }
  }

  function isPhoneIdle() {
    return !audio.src || audio.paused || audio.ended;
  }

  async function playReplayEntry(entry, { fromCatchUp, gated = true, seekSec = 0, live = false } = {}) {
    if (!entry?.file) {
      toast("No replay");
      return;
    }
    if (isReplayEntryHidden(entry)) {
      toast("That dev is hidden");
      return;
    }
    // Arbitration: mac-live owns the player.
    if (gated && isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    // A Mac stop/seek round-trip is in flight — the Mac may still be audible
    // for a beat; don't start a second audio plane under it.
    if (gated && macActionPending) {
      toast("One sec…");
      return;
    }
    if (!fromCatchUp) {
      catchUpMode = false;
      catchUpQueue = [];
    }
    phonePendingTap = false;
    phoneLoading = true; // spinner until 'playing' (or pending-tap/error)
    const loadGen = ++phoneLoadGen; // stale-load guard (rapid track switches)
    macPaused = null; // starting phone playback supersedes a Mac pause
    currentIndex = replayList.findIndex((e) => e.file === entry.file);
    phoneMeta = entry;
    pendingNewEntry = null;
    newPill.classList.remove("on");
    pendingSeekSec = Number.isFinite(seekSec) && seekSec > 0 ? seekSec : 0;
    audio.muted = false;
    liveMode = !!live;
    liveComplete = false;
    liveBaseSec = 0;
    liveRetries = 0;
    if (live) {
      // Growing file: chunked live tail. Full rate applies here too — the
      // baked residual (entry.playbackRate) is part of the configured speed,
      // not an optional extra.
      audio.src = `/live-audio/${encodeURIComponent(entry.file)}?v=${Date.now()}`;
    } else {
      audio.src = `/replay-audio/${encodeURIComponent(entry.file)}`;
    }
    applySpeed();
    renderPlayer();
    renderMessages();
    updateBars();
    try {
      await audio.play();
    } catch {
      // Autoplay rejected — but only if this is still the CURRENT load. A
      // rapid track switch aborts the old play() (AbortError), which must not
      // mislabel the new track "Ready — tap to play".
      if (loadGen === phoneLoadGen) {
        phonePendingTap = true;
        phoneLoading = false;
        toast("Ready — tap to play");
      }
    }
    renderPlayer();
  }

  async function playAtIndex(i, opts) {
    if (i < 0 || i >= replayList.length) return;
    await playReplayEntry(replayList[i], opts);
  }

  // §3 replay-match fallback: exact sessionId → newest same sessionName → toast.
  async function replayForAgent(agent) {
    if (isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    try {
      await refreshReplayList();
    } catch {
      toast("Replay list failed");
      return;
    }
    const displayName = agent.label || agent.name;
    // Search the FULL catalog — "Clear messages" hides entries from the
    // Messages list, but a card's Replay last should still find them.
    let entry = allReplayList.find((e) => e.sessionId === agent.sessionId);
    if (!entry) {
      const raw = agentRawName(agent);
      entry = allReplayList.find(
        (e) => String(e.sessionName || "").trim() === raw
      );
    }
    if (!entry) {
      toast(`No replays yet for ${displayName}`);
      return;
    }
    await playReplayEntry(entry);
  }

  async function playLatest() {
    if (isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    if (!replayList.length) {
      try { await refreshReplayList(); } catch { toast("Replay list failed"); return; }
    }
    if (!replayList.length) {
      toast("No replays yet");
      return;
    }
    await playReplayEntry(replayList[0]);
  }

  // Grant-to-phone: nowPlaying.output === "phone" → play exactly replayFile.
  async function maybePlayGrantToPhone(np) {
    const file = np.replayFile;
    if (!file) return;
    if (phoneMeta?.file === file && !isPhoneIdle()) return; // already on it
    const live = np.synthesisComplete === false;
    // Try to enrich from the replay list (alignment, name) — pointless while
    // live (the .mp3 isn't on disk yet), so synthesize from nowPlaying.
    let entry = null;
    if (!live) {
      try {
        await refreshReplayList();
        entry = replayList.find((e) => e.file === file);
      } catch { /* fall through */ }
    }
    if (!entry) {
      entry = {
        file,
        sessionId: np.sessionId,
        alignment: np.alignment,
        spokenText: np.text,
        rawText: np.rawText,
        textPreview: np.text,
        playbackRate: np.playbackRate,
      };
    }
    if (live) liveNp = np;
    // Not gated by mac-live: this IS the routed phone output, not a Mac plane.
    await playReplayEntry(entry, { gated: false, live });
  }

  /* --------------- live-stream helpers (v2.3) --------------- */
  // The finalize SSE frame doesn't change nowPlayingKey — check every frame.
  function checkLiveFinalize(np) {
    if (!liveMode || !phoneMeta || !np || np.replayFile !== phoneMeta.file) return;
    liveNp = np;
    if (np.synthesisComplete && !liveComplete) {
      liveComplete = true;
      if (np.alignment) phoneMeta.alignment = np.alignment;
      if (np.playbackRate) phoneMeta.playbackRate = np.playbackRate;
      refreshReplayList(); // the finalized .mp3 is in the catalog now
      renderPlayer();
    }
  }

  // Swap the live stream for the seekable static file at a known position.
  async function switchLiveToStatic(seekSec) {
    if (!phoneMeta?.file) return;
    liveMode = false;
    liveBaseSec = 0;
    pendingSeekSec = Math.max(0, seekSec);
    audio.src = `/replay-audio/${encodeURIComponent(phoneMeta.file)}`;
    applySpeed();
    try { await audio.play(); } catch {
      phonePendingTap = true;
      toast("Tap to play");
    }
    renderPlayer();
  }

  // The live stream ended/errored at the growing edge but synthesis isn't
  // done — reconnect from where we left off (byte offset ≈ seconds × CBR rate).
  async function reconnectLive() {
    if (!phoneMeta?.file || !liveMode) return;
    liveProgressWall = Date.now();
    liveBaseSec += audio.currentTime || 0;
    if (liveComplete) {
      await switchLiveToStatic(liveBaseSec);
      return;
    }
    if (liveRetries++ >= 5) {
      // No forward progress across several reconnects — stop looping; the
      // finalize frame (or a manual tap) recovers playback.
      phoneLoading = false;
      renderPlayer();
      return;
    }
    const fromBytes = Math.floor(liveBaseSec * LIVE_BYTES_PER_SEC);
    // Server contract: bytes from `from` to EOF (tailing the .part while it
    // grows, or draining the finalized file) — position is always ours.
    audio.src = `/live-audio/${encodeURIComponent(phoneMeta.file)}?from=${fromBytes}&v=${Date.now()}`;
    applySpeed();
    try { await audio.play(); } catch {
      phonePendingTap = true;
      toast("Tap to keep playing");
      renderPlayer();
    }
  }

  // keepSheet: End-live stops audio but must land back on the chat surface,
  // not dump the owner to the room list.
  function clearPhonePlayback(opts = {}) {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    phoneMeta = null;
    currentIndex = -1;
    phonePendingTap = false;
    lastPhonePauseAt = 0;
    liveMode = false;
    liveComplete = false;
    liveBaseSec = 0;
    liveNp = null;
    liveRetries = 0;
    stopCatchUp();
    if (!opts.keepSheet) closeExpanded();
    renderPlayer();
    renderMessages();
    updateBars();
  }

  // Like clearPhonePlayback but keeps the sheet open — mac-live takes the
  // player via SSE right after a phone→mac handoff.
  function clearLocalForHandoff() {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    phoneMeta = null;
    currentIndex = -1;
    phonePendingTap = false;
    renderPlayer();
    renderMessages();
    updateBars();
  }

  /* ============================================================
     §A3  Live device handoff (Spotify pause-at-position model)
     ============================================================ */
  function cancelHandoff(msg) {
    clearTimeout(handoffTimer);
    handoffAwait = null;
    expStatus.hidden = true;
    renderPlayer();
    if (msg) toast(msg);
  }

  // Mac speaking → this phone. Capture position, stop the Mac, then play the
  // saved replay locally (seeked) once SSE delivers endedAt + replayFile.
  function beginMacToPhone() {
    const ps = computePlayerState();
    if (ps.kind !== "mac-live") return;
    const np = ps.nowPlaying;
    // macElapsedMs already returns natural-file ms (wall time × atempo rate),
    // and audio.currentTime seeks in natural-file seconds — no rate division.
    const offsetSec = macElapsedMs(np) / 1000;
    const agent = agentForSession(np.sessionId);
    primeAudio(); // unlock <audio> inside this tap so a later play() works
    handoffAwait = {
      offsetSec,
      sessionId: np.sessionId,
      startedAt: np.startedAt,
      character: agent ? avatarDir(agent) : "default",
      name: agent ? agent.label || agent.name : String(np.sessionId || "").slice(0, 8),
    };
    clearTimeout(handoffTimer);
    // Covers the common drain (seconds); a slow-network drain can run longer —
    // 30s balances that against leaving the user staring at "Moving…".
    handoffTimer = setTimeout(() => cancelHandoff("Couldn't move playback"), 30000);
    postAction({ type: "stop" }).then((r) => {
      if (!r) cancelHandoff("Couldn't move playback");
    });
    renderPlayer();
  }

  function checkMacToPhoneHandoff() {
    if (!handoffAwait) return;
    const np = snapshot.nowPlaying;
    if (!np || !np.replayFile || !np.endedAt) return;
    const sameSession = !handoffAwait.sessionId || np.sessionId === handoffAwait.sessionId;
    const sameStart =
      !handoffAwait.startedAt || !np.startedAt || np.startedAt === handoffAwait.startedAt;
    if (!sameSession || !sameStart) return;
    const { offsetSec } = handoffAwait;
    const file = np.replayFile;
    clearTimeout(handoffTimer);
    handoffAwait = null;
    expStatus.hidden = true;
    playHandoffFile(file, np, offsetSec);
  }

  async function playHandoffFile(file, np, offsetSec) {
    let entry = null;
    try {
      await refreshReplayList();
      entry =
        replayList.find((e) => e.file === file) ||
        allReplayList.find((e) => e.file === file);
    } catch { /* fall through */ }
    if (!entry) {
      entry = {
        file,
        sessionId: np.sessionId,
        alignment: np.alignment,
        spokenText: np.text,
        textPreview: np.text,
        playbackRate: np.playbackRate,
      };
    }
    // Revalidate: a NEWER Mac playback may have started during the fetch —
    // starting the old replay locally would double up audio on both devices.
    const cur = snapshot.nowPlaying;
    if (cur && !cur.endedAt && cur.startedAt !== np.startedAt && isNowPlayingActive(cur)) {
      toast("Mac started speaking — handoff cancelled");
      renderPlayer();
      return;
    }
    await playReplayEntry(entry, { gated: false, seekSec: offsetSec });
  }

  // This phone → Mac. Pause locally, ask the Mac to play the same replay from
  // the current offset; on refusal, stay paused.
  function beginPhoneToMac() {
    if (!phoneMeta?.file) return;
    audio.pause();
    const file = phoneMeta.file;
    const offsetSec = audio.currentTime || 0;
    lastPhonePauseAt = offsetSec;
    renderPlayer();
    postAction({ type: "play_replay", file, offsetSec }).then((r) => {
      // Success: keep the paused local source as recovery until the mac-live
      // SSE record actually appears (HTTP ok only means the spawn was issued);
      // the player flips to mac-live on that frame and local stays paused.
      if (!r) toast("Mac is busy");
    });
  }

  /* ============================================================
     Arbitration: pause phone audio when mac-live begins
     ============================================================ */
  function enforceArbitration() {
    if (isMacLive() && phoneMeta && !audio.paused && !audio.ended) {
      lastPhonePauseAt = audio.currentTime || 0;
      audio.pause();
    }
  }

  /* ============================================================
     §3  Session cards
     ============================================================ */
  function replyBoxHtml(agent, ns) {
    const displayName = agent.label || agent.name;
    const injectable = isInjectable(agent);
    if (!injectable) return "";
    const draft = replyDrafts[agent.sessionId] || "";
    const open = openReplySession === agent.sessionId || ns === "exp";
    return `
      <div class="reply-box" data-reply-box="${escapeHtml(agent.sessionId)}"${open ? "" : " hidden"}>
        <textarea class="reply-input" data-reply-for="${escapeHtml(agent.sessionId)}"
          placeholder="Reply to ${escapeHtml(displayName)}…">${escapeHtml(draft)}</textarea>
        <div class="reply-actions">
          <button type="button" class="ghost" data-reply-cancel="${escapeHtml(agent.sessionId)}">Cancel</button>
          <button type="button" class="accent grow" data-reply-send="${escapeHtml(agent.sessionId)}">${iconHtml("send", "sm")} Send</button>
        </div>
      </div>`;
  }

  function renderMembers() {
    const focus = captureReplyFocus();
    const agents = visibleAgents();
    if (!agents.length) {
      members.innerHTML = `<div class="empty">No agents in the room</div>`;
      return;
    }
    members.innerHTML = agents
      .map((agent) => {
        const character = avatarDir(agent);
        const speaking = agent.state === "speaking";
        const frame = speaking ? "speaking" : "idle";
        // Grant landed (any transition away from hand_raised, incl. speaking)
        // — drop the "Working…" pending so the next raise gets a live button.
        if (agent.state !== "hand_raised" && grantPending.has(agent.sessionId)) {
          clearTimeout(grantPending.get(agent.sessionId));
          grantPending.delete(agent.sessionId);
        }
        const injectable = isInjectable(agent);
        const displayName = agent.label || agent.name;
        const rawName = agentRawName(agent);

        const stateBadge = speaking
          ? `<span class="badge speaking pulse">speaking</span>`
          : `<span class="badge ${escapeHtml(agent.state)}">${escapeHtml(
              String(agent.state).replace("_", " ")
            )}</span>`;

        const mutedChip = agent.muted ? `<span class="chip muted">muted</span>` : "";
        const queueChip =
          agent.raisedCount > 1
            ? `<span class="chip" title="Queued">${agent.raisedCount} queued</span>`
            : "";

        // §3 queued preview line (hand raised only; degrade if absent).
        let waiting = "";
        if (agent.state === "hand_raised" && agent.queuedPreview) {
          const qp = String(agent.queuedPreview);
          const trimmed = qp.length > 120 ? qp.slice(0, 120) + "…" : qp;
          waiting = `<div class="waiting">Waiting: <em>“${escapeHtml(trimmed)}”</em></div>`;
        }

        // Primary action by state.
        let primary = "";
        if (agent.state === "hand_raised") {
          if (grantPending.has(agent.sessionId)) {
            primary = `<button type="button" class="accent grow read-update" disabled>${iconHtml(
              "rotate-ccw",
              "spin sm"
            )} Working…</button>`;
          } else {
            const sub = outputPref === "phone" ? "on this phone" : "on Mac";
            primary = `<button type="button" class="accent grow read-update" data-grant="${escapeHtml(
              agent.sessionId
            )}">${iconHtml("play", "filled sm")} Read update<span class="sub">${sub}</span></button>`;
          }
        } else if (!speaking) {
          primary = `<button type="button" class="ghost grow" data-replay="${escapeHtml(
            agent.sessionId
          )}">Replay last</button>`;
        }

        // Reply affordance.
        let reply;
        if (injectable) {
          const liveChip = agent.live?.on
            ? `${iconHtml("smartphone", "sm")} LIVE`
            : "Chat";
          reply = `<button type="button" class="ghost${agent.live?.on ? " accent" : ""}" data-chat="${escapeHtml(
            agent.sessionId
          )}">${liveChip}</button><button type="button" class="ghost" data-reply-toggle="${escapeHtml(
            agent.sessionId
          )}">Reply</button>`;
        } else {
          reply = `<button type="button" class="ghost" data-reply-blocked="1">Reply</button>`;
        }

        const actions =
          primary || reply
            ? `<div class="card-actions">${primary}${reply}</div>`
            : "";
        const hint = injectable
          ? ""
          : `<div class="reply-hint">Reply off — not in team room. Respawn from ＋ to enable.</div>`;

        const hideBtn = rawName
          ? `<button type="button" class="btn-hide-dev" data-hide-dev="${escapeHtml(
              rawName
            )}" aria-label="Hide ${escapeHtml(displayName)}">Hide</button>`
          : "";

        return `
          <article class="card" data-session="${escapeHtml(agent.sessionId)}">
            <div class="row card-member-row">
              <div style="position:relative">
                <img class="avatar" src="${avatarSrc(character, frame)}" alt=""
                  onerror="this.onerror=null;this.src='${avatarSrc("default", frame)}'" />
                ${
                  agent.state === "hand_raised"
                    ? `<div style="position:absolute;right:-4px;top:-4px;font-size:1.1rem">✋</div>`
                    : ""
                }
              </div>
              <div class="meta">
                <p class="name">${escapeHtml(displayName)}</p>
                ${stateBadge}
                <div class="chips">${queueChip}${mutedChip}</div>
                ${waiting}
              </div>
              ${hideBtn}
            </div>
            ${actions}
            ${hint}
            ${replyBoxHtml(agent, "card")}
          </article>`;
      })
      .join("");
    restoreReplyFocus(focus);
  }

  /* --------------- reply focus preservation --------------- */
  function captureReplyFocus() {
    const el = document.activeElement;
    if (el && el.classList && el.classList.contains("reply-input")) {
      return {
        id: el.getAttribute("data-reply-for"),
        start: el.selectionStart,
        end: el.selectionEnd,
      };
    }
    return null;
  }
  function restoreReplyFocus(focus) {
    if (!focus || !focus.id) return;
    const ta = members.querySelector(
      `.reply-input[data-reply-for="${focus.id}"]`
    );
    if (ta) {
      ta.focus();
      try { ta.setSelectionRange(focus.start, focus.end); } catch { /* noop */ }
    }
  }

  /* ============================================================
     Reply send (§7)
     ============================================================ */
  async function sendReply(sessionId, textarea) {
    const text = String(textarea?.value || "").trim();
    const agent = agentForSession(sessionId);
    const name = agent ? agent.label || agent.name : "agent";
    if (!text) {
      toast("Type a reply first");
      return;
    }
    if (text.length > 4000) {
      toast("Reply too long");
      return;
    }
    // Prime the ack element inside the tap gesture (before any await) so the
    // "on it, boss" clip can autoplay when the server routes it here.
    try { ackAudio.src = SILENT_WAV; ackAudio.play().catch(() => {}); } catch { /* noop */ }
    const r = await postAction({ type: "reply", sessionId, text });
    const status = r ? r.status || "ok" : "failed";
    if (status === "ok") {
      toast(`Reply sent to ${name}`);
      liveClipCounts[sessionId] = 0;
      lastThreadSig = null;
      delete replyDrafts[sessionId];
      openReplySession = null;
      textarea.value = "";
      autoGrowComposer(textarea);
      fetchThread(sessionId);
      renderMembers();
      renderExpandedChrome();
    } else if (status === "not_in_team") {
      toast("Not in team room — respawn from ＋");
    } else {
      toast("Reply failed");
    }
  }

  /* ============================================================
     Hidden devs (preserved)
     ============================================================ */
  function renderHiddenDevs() {
    const names = [...hiddenDevNames].sort((a, b) => a.localeCompare(b));
    const count = names.length;
    if (!count) {
      hiddenDevs.hidden = true;
      hiddenDevsList.hidden = true;
      hiddenDevsList.innerHTML = "";
      btnHiddenDevs.setAttribute("aria-expanded", "false");
      return;
    }
    hiddenDevs.hidden = false;
    btnHiddenDevs.textContent = count === 1 ? "1 hidden" : `${count} hidden`;
    hiddenDevsList.innerHTML = names
      .map((rawName) => {
        const agent = (snapshot.agents || []).find((a) => agentRawName(a) === rawName);
        let label = rawName;
        let sub = "";
        if (agent) {
          label = agent.label || agent.name || rawName;
          if (String(label) !== rawName) sub = rawName;
        }
        return `
          <div class="hidden-dev-row">
            <div class="hidden-dev-identity">
              <div class="hidden-dev-label">${escapeHtml(label)}</div>
              ${sub ? `<div class="hidden-dev-name">${escapeHtml(sub)}</div>` : ""}
            </div>
            <button type="button" class="btn-show-dev" data-show-dev="${escapeHtml(
              rawName
            )}" aria-label="Show ${escapeHtml(label)}">Show</button>
          </div>`;
      })
      .join("");
  }

  function memberCard(sessionId) {
    if (!sessionId) return null;
    return (
      [...members.querySelectorAll("[data-session]")].find(
        (el) => el.getAttribute("data-session") === sessionId
      ) || null
    );
  }

  function setDevHidden(rawName, hidden) {
    const name = String(rawName || "").trim();
    if (!name) return;
    if (hiddenDevNames.has(name) === hidden) return;
    const matchedAgent = (snapshot.agents || []).find((a) => agentRawName(a) === name);
    const displayName = matchedAgent?.label || matchedAgent?.name || name;
    if (hidden) hiddenDevNames.add(name);
    else hiddenDevNames.delete(name);
    if (!saveHiddenDevNames()) {
      if (hidden) hiddenDevNames.delete(name);
      else hiddenDevNames.add(name);
      return;
    }
    if (hidden) {
      if (phoneMeta && entryRawName(phoneMeta) === name) {
        clearPhonePlayback();
      } else if (catchUpMode) {
        catchUpQueue = catchUpQueue.filter((e) => !isReplayEntryHidden(e));
      }
    }
    applyReplayVisibility();
    knownFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
    render();
    toast(hidden ? `Hidden ${displayName}` : `Showing ${displayName}`);
    if (hidden) {
      if (!hiddenDevs.hidden) btnHiddenDevs.focus();
    } else {
      const card = memberCard(matchedAgent?.sessionId);
      if (card) {
        card.setAttribute("tabindex", "-1");
        card.focus();
      } else if (!hiddenDevs.hidden) {
        btnHiddenDevs.focus();
      }
    }
  }

  /* ============================================================
     §5  Messages
     ============================================================ */
  function unheardCount() {
    return (replayList || []).filter(
      (e) => e.file && !listened.has(e.file) && e.kind !== "ack"
    ).length;
  }

  function updateBars() {
    const n = unheardCount();
    // Catch up moved to the ⋮ overflow menu (§C5).
    if (catchUpMode) {
      miCatchup.hidden = false;
      miCatchup.textContent = "Stop catch-up";
    } else if (n > 0) {
      miCatchup.hidden = false;
      miCatchup.textContent = `Catch up (${n} unheard)`;
    } else {
      miCatchup.hidden = true;
    }
    // While the inline confirm is open, the Clear button stays hidden — an
    // SSE re-render must not resurrect it next to Confirm/Cancel.
    btnClear.style.display =
      replayList.length && clearConfirm.hidden ? "" : "none";
  }

  function renderMessages() {
    if (!replayList.length) {
      messagesEl.innerHTML = `<div class="empty">No messages yet</div>`;
      updateBars();
      return;
    }
    messagesEl.innerHTML = replayList
      .map((entry, i) => {
        const character = entryCharacter(entry);
        const name = entryName(entry);
        const preview = entryPreview(entry);
        const ago = timeAgo(entry.timestamp);
        const heard = listened.has(entry.file);
        const playing = i === currentIndex && phoneMeta && !phonePendingTap;
        return `
          <button type="button" class="msg-row${playing ? " playing" : ""}" data-msg-idx="${i}">
            <img class="avatar sm" src="${avatarSrc(character, "idle")}" alt=""
              onerror="this.onerror=null;this.src='${avatarSrc("default", "idle")}'" />
            <div class="msg-body">
              <div class="msg-top">
                <span class="msg-name">${escapeHtml(name)}</span>
                <span class="msg-ago">${escapeHtml(ago)}</span>
              </div>
              <div class="msg-preview">${escapeHtml(preview)}</div>
            </div>
            <span class="unheard${heard ? " hidden" : ""}" aria-label="unheard"></span>
          </button>`;
      })
      .join("");
    updateBars();
  }

  function clearMessages() {
    if (!replayList.length) return;
    let changed = false;
    for (const e of replayList) {
      if (!e.file) continue;
      if (!listened.has(e.file)) { listened.add(e.file); changed = true; }
      if (!clearedFiles.has(e.file)) { clearedFiles.add(e.file); changed = true; }
    }
    if (changed) {
      saveStrSet(LISTENED_KEY, listened);
      saveStrSet(CLEARED_KEY, clearedFiles);
    }
    stopCatchUp();
    applyReplayVisibility();
    knownFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
    renderMessages();
    updateBars();
    toast("Messages cleared");
  }

  /* ============================================================
     Catch-up (preserved)
     ============================================================ */
  function stopCatchUp() {
    catchUpMode = false;
    catchUpQueue = [];
    updateBars();
  }
  async function startCatchUp() {
    if (isMacLive()) {
      toast("Mac is speaking — stop it first");
      return;
    }
    const unheard = [...replayList]
      .filter((e) => e.file && !listened.has(e.file) && e.kind !== "ack")
      .reverse();
    if (!unheard.length) {
      toast("Nothing to catch up");
      return;
    }
    catchUpMode = true;
    catchUpQueue = unheard;
    updateBars();
    const next = catchUpQueue.shift();
    await playReplayEntry(next, { fromCatchUp: true });
  }
  async function onTrackEnded() {
    if (liveMode) {
      // Live stream played to its real end — leave the (unseekable) chunked
      // src behind so restart/scrub/speed work on the finalized file.
      liveMode = false;
      liveBaseSec = 0;
      if (phoneMeta?.file) {
        audio.src = `/replay-audio/${encodeURIComponent(phoneMeta.file)}`;
        applySpeed();
      }
    }
    if (phoneMeta?.file) markListened(phoneMeta.file);
    if (catchUpMode) catchUpQueue = catchUpQueue.filter((e) => !isReplayEntryHidden(e));
    if (catchUpMode && catchUpQueue.length && !isMacLive()) {
      const next = catchUpQueue.shift();
      await playReplayEntry(next, { fromCatchUp: true });
      return;
    }
    if (catchUpMode) stopCatchUp();
    renderPlayer();
    renderMessages();
  }

  /* ============================================================
     Replay list fetch / visibility
     ============================================================ */
  async function fetchReplayList() {
    const res = await fetch("/replay-list");
    if (!res.ok) throw new Error("replay-list failed");
    return await res.json();
  }
  function applyReplayVisibility() {
    replayList = allReplayList.filter(
      (entry) => !isReplayEntryHidden(entry) && !clearedFiles.has(entry.file)
    );
    if (phoneMeta?.file) {
      currentIndex = replayList.findIndex((e) => e.file === phoneMeta.file);
    } else {
      currentIndex = -1;
    }
    const visibleFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
    catchUpQueue = catchUpQueue.filter((e) => e.file && visibleFiles.has(e.file));
    if (pendingNewEntry && !visibleFiles.has(pendingNewEntry.file)) {
      pendingNewEntry = null;
      newPill.classList.remove("on");
    }
  }
  async function refreshReplayList({ detectNew } = {}) {
    try {
      const list = await fetchReplayList();
      const prevKnown = knownFiles;
      pruneAgainst(listened, LISTENED_KEY, list);
      pruneAgainst(clearedFiles, CLEARED_KEY, list);
      allReplayList = Array.isArray(list) ? list : [];
      applyReplayVisibility();
      const newFiles = replayList.filter((e) => e.file && !prevKnown.has(e.file));
      knownFiles = new Set(replayList.map((e) => e.file).filter(Boolean));
      if (detectNew && newFiles.length && isPhoneIdle() && !isMacLive()) {
        pendingNewEntry = newFiles[0];
        newPill.classList.add("on");
      }
      renderMessages();
      renderPlayer();
    } catch {
      /* keep prior list */
    }
  }

  /* ============================================================
     §4  Header render + §6 picker helpers
     ============================================================ */
  function renderHeader() {
    heldPill.hidden = !snapshot.roomHeld;
    $("mi-hold").textContent = snapshot.roomHeld ? "Release room" : "Hold room";
    renderHeaderDevice();
  }

  function render() {
    renderHeader();
    renderMembers();
    renderHiddenDevs();
    renderMessages();
    enforceArbitration();
    renderPlayer();
  }

  /* ============================================================
     Karaoke / progress tick
     ============================================================ */
  function tick() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") {
      updateExpandedKaraoke();
      updatePlayerProgress();
      renderMiniChrome();
    } else if (ps.kind === "phone-replay" && !audio.paused && !phonePendingTap) {
      updateExpandedKaraoke();
      updatePlayerProgress();
      checkListenedProgress();
    } else if (expanded.classList.contains("convo") && expanded.classList.contains("live-on")) {
      // Keep call/pin timers + strip visibility fresh while idle/working in live.
      const elapsed = fmtLiveElapsed();
      if (cvCallTimer) cvCallTimer.textContent = elapsed;
      if (cvPinTimer) cvPinTimer.textContent = elapsed;
      const agent = convoAgent();
      if (agent) {
        renderPlaybackStrip(agent);
        // Re-evaluate card precedence (speaking ↔ working ↔ idle) without full thread rebuild.
        renderCallCard(agent, true);
      }
    }
  }

  function checkListenedProgress() {
    if (!phoneMeta?.file) return;
    const dur = trackDurationSec();
    const cur = audio.currentTime || 0;
    if (dur > 0 && cur / dur >= 0.8) markListened(phoneMeta.file);
  }

  /* ============================================================
     §6  Session picker
     ============================================================ */
  let pickerData = null;
  let pickerTab = "new";
  let pickerPersona = null;

  async function openPicker() {
    picker.hidden = false;
    pickerBackdrop.hidden = false;
    document.body.classList.add("picker-open"); // lock background scroll (§C6)
    requestAnimationFrame(() => picker.classList.add("open"));
    pickerList.innerHTML = `<div class="empty">Loading…</div>`;
    pickerPersonas.innerHTML = "";
    try {
      const res = await fetch("/picker");
      if (!res.ok) throw new Error("no picker");
      pickerData = await res.json();
    } catch {
      pickerData = null;
      pickerList.innerHTML = `<div class="empty">Session picker unavailable</div>`;
      return;
    }
    const personas = Array.isArray(pickerData.personas) ? pickerData.personas : [];
    pickerPersona = personas.length ? personas[0] : null;
    renderPicker();
  }
  function closePicker() {
    picker.classList.remove("open");
    pickerBackdrop.hidden = true;
    document.body.classList.remove("picker-open");
    setTimeout(() => { picker.hidden = true; }, 260);
  }
  function renderPicker() {
    if (!pickerData) return;
    const personas = Array.isArray(pickerData.personas) ? pickerData.personas : [];
    pickerPersonas.innerHTML = personas.length
      ? personas
          .map((p) => {
            const char = String(p).toLowerCase();
            return `<button type="button" class="persona-chip${
              p === pickerPersona ? " active" : ""
            }" data-persona="${escapeHtml(p)}">` +
              `<img class="persona-avatar" src="${avatarSrc(char, "idle")}" alt="" ` +
              `onerror="this.onerror=null;this.src='${avatarSrc("default", "idle")}'" />` +
              `<span class="persona-cap">${escapeHtml(p)}</span></button>`;
          })
          .join("")
      : `<span class="chip">default</span>`;

    for (const t of picker.querySelectorAll(".tab")) {
      t.classList.toggle("active", t.getAttribute("data-tab") === pickerTab);
    }

    if (pickerTab === "new") {

      grantPending.set(
        sessionId,
        setTimeout(() => {
          grantPending.delete(sessionId);
          renderMembers();

      );
      renderMembers();
      postAction({ type: "grant", sessionId, output: toPhone ? "phone" : "mac" }).then((r) => {

  // Progress seek (phone-replay only): tap or drag, via pointer capture.
  let scrubbing = false;
  function seekToPointer(ev) {
    const dur = trackDurationSec();
    if (dur <= 0) return;
    const rect = $("progress").getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (ev.clientX - rect.left) / rect.width));
    if (liveMode) {
      // Live stream: only what this connection has buffered is seekable —
      // clamp backward seeks to it, never past the growing edge.
      const rel = frac * dur - liveBaseSec;
      const buf = audio.buffered;
      const bufEnd = buf.length ? buf.end(buf.length - 1) : 0;
      const clamped = Math.min(Math.max(rel, 0), Math.max(0, bufEnd - 0.3));
      try { audio.currentTime = clamped; } catch { /* not seekable yet */ }
      updatePlayerProgress();
      return;
    }
    try { audio.currentTime = frac * dur; } catch { /* not seekable yet */ }
    updatePlayerProgress();
  }
  // Mac scrub applies once, on release — mid-drag we only preview the fill
  // (each Mac seek is a stop + play_replay round-trip, not a slider).
  function pointerFrac(ev) {
    const rect = $("progress").getBoundingClientRect();
    return Math.min(1, Math.max(0, (ev.clientX - rect.left) / rect.width));
  }
  function macDur(ps) {
    return macDurationMs(ps.nowPlaying) / 1000;
  }
  $("progress").addEventListener("pointerdown", (ev) => {
    const k = computePlayerState().kind;
    if (k === "phone-replay") {
      scrubbing = true;
      try { $("progress").setPointerCapture(ev.pointerId); } catch {}
      seekToPointer(ev);
    } else if (k === "mac-live" || k === "mac-paused") {
      macScrubbing = true;
      try { $("progress").setPointerCapture(ev.pointerId); } catch {}
      progressFill.style.width = `${pointerFrac(ev) * 100}%`;
    }
  });
  $("progress").addEventListener("pointermove", (ev) => {
    if (scrubbing) seekToPointer(ev);
    else if (macScrubbing) progressFill.style.width = `${pointerFrac(ev) * 100}%`;
  });
  $("progress").addEventListener("pointerup", (ev) => {
    scrubbing = false;
    if (macScrubbing) {
      macScrubbing = false;
      const ps = computePlayerState();
      if (ps.kind === "mac-live" || ps.kind === "mac-paused") {
        macSeek(pointerFrac(ev) * macDur(ps));
      }
    }
  });
  $("progress").addEventListener("pointercancel", () => {
    scrubbing = false;
    macScrubbing = false;
    updatePlayerProgress();
  });
  $("progress").addEventListener("click", (ev) => {
    const k = computePlayerState().kind;
    if (k === "phone-replay") {

    // message pane) is a scroll-back-up, not a pull-to-collapse.
    let el = ev.target instanceof Element ? ev.target : null;

      if (el.scrollHeight > el.clientHeight && el.scrollTop > 0) {

  /* ============================================================
     SSE
     ============================================================ */
  function nowPlayingKey(np) {
    if (!np) return null;
    return `${np.sessionId || ""}|${np.startedAt || ""}|${(np.text || "").slice(0, 40)}`;
  }

  function connectSse() {
    const es = new EventSource("/events");
    es.onopen = () => conn.classList.add("live");
    es.onerror = () => conn.classList.remove("live");
    es.onmessage = (ev) => {
      try {
        const next = JSON.parse(ev.data);
        // Typed notice events (spawn failures / dedup) — toast only.
        if (next && next.type === "notice") {
          toast(next.message || "Something went wrong");
          return;
        }
        const prevKey = lastNowPlayingKey;
        const nextKey = nowPlayingKey(next.nowPlaying);
        snapshot = next;
        render();
        // Live handoff (§A3): fires on the endedAt+replayFile frame, which
        // does NOT change nowPlayingKey — check it every frame.
        if (handoffAwait) checkMacToPhoneHandoff();
        // Live grant finalize (v2.3): same deal — the synthesisComplete
        // re-stamp keeps the key unchanged.
        checkLiveFinalize(next.nowPlaying);
        // Reply ack routed to this phone (conversation view).
        handlePhoneAckFrame(next.phoneAck);
        if (nextKey && nextKey !== prevKey) {
          lastNowPlayingKey = nextKey;
          refreshReplayList({ detectNew: true });
          // Grant-to-phone: play exactly replayFile when routed to the phone.
          // Fired once per new now-playing to avoid restart on repeat frames.
          const np = next.nowPlaying;
          if (np?.kind === "live" && np.sessionId) {
            liveClipCounts[np.sessionId] = (liveClipCounts[np.sessionId] || 0) + 1;
          }
          // /thread is source of truth — refetch after each non-live (final) frame.
          if (np?.sessionId && np.kind !== "live") {
            const ca = convoAgent();
            if (ca && ca.sessionId === np.sessionId) fetchThread(np.sessionId);
          }
          if (isNowPlayingActive(np) && np.output === "phone" && np.replayFile) {
            maybePlayGrantToPhone(np);
          }
        } else if (!nextKey) {
          lastNowPlayingKey = null;
        }
      } catch { /* ignore */ }
    };
  }

  async function boot() {
    try {
      const [snapRes, charsRes] = await Promise.all([
        fetch("/snapshot"),
        fetch("/characters"),
      ]);
      if (snapRes.ok) snapshot = await snapRes.json();
      if (charsRes.ok) charactersPayload = await charsRes.json();
    } catch { /* SSE fills in */ }
    lastNowPlayingKey = nowPlayingKey(snapshot.nowPlaying);
    // Never replay a pre-load ack on boot.
    lastAckAt = snapshot.phoneAck?.at || null;
    try { await refreshReplayList(); } catch { /* empty until later */ }
    render();
    // If we boot into an active phone-routed grant, pick it up.
    const np = snapshot.nowPlaying;
    if (isNowPlayingActive(np) && np.output === "phone" && np.replayFile) {
      maybePlayGrantToPhone(np);
    }
    connectSse();
    karaokeTimer = setInterval(tick, 80);
  }

  boot();
})();
  </script>
</body>
</html>
