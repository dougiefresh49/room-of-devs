<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Room of Devs</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #1a1d24;
      --surface2: #242830;
      --border: #2e3340;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --working: #4a9eff;
      --hand: #e6a817;
      --speaking: #3ecf8e;
      --idle: #6b7280;
      --danger: #ef4444;
      --amber: #e6a817;
      --karaoke: #ffe566;
      --accent: #3ecf8e;
      --player-h: 76px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100%;
    }
    body {
      padding: 12px 12px calc(var(--player-h) + env(safe-area-inset-bottom) + 16px);
    }
    body.player-hidden {
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    /* ---------------- Header ---------------- */
    header { margin-bottom: 14px; }
    .titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 650;
      margin: 0;
      letter-spacing: -0.02em;
      flex: 1 1 auto;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
    }
    .dot.live { background: var(--speaking); }
    .icon-btn {
      min-height: 44px;
      min-width: 44px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
    }
    .held-pill {
      display: block;
      width: 100%;
      margin-top: 10px;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #3a2e10;
      border: 1px solid #6a5820;
      color: #ffe0a0;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: left;
    }

    /* ---------------- Menus / popovers ---------------- */
    .menu {
      position: fixed;
      z-index: 40;
      background: #1c2029;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      min-width: 180px;
    }
    .menu-item {
      display: block;
      width: 100%;
      text-align: left;
      min-height: 44px;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 550;
    }
    .menu-item:active { background: var(--surface2); }

    button {
      min-height: 44px;
      min-width: 44px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 560;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.accent { background: #2a3a2e; border-color: #3a5a42; color: #d4ffe4; }
    button.ghost { background: transparent; border-color: var(--border); color: var(--muted); }

    /* ---------------- Icons (lucide-style inline SVG) ---------------- */
    .icon {
      width: 22px;
      height: 22px;
      display: inline-block;
      vertical-align: middle;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .icon.filled { fill: currentColor; stroke: none; }
    .icon.lg { width: 28px; height: 28px; }
    .icon.sm { width: 18px; height: 18px; }

    /* ---------------- Header device toggle (§A1) ---------------- */
    .dev-toggle {
      display: inline-flex;
      align-items: stretch;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }
    .dev-seg {
      min-width: 44px;
      min-height: 44px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 0;
      color: var(--muted);
    }
    .dev-seg + .dev-seg { border-left: 1px solid var(--border); }
    .dev-seg.active { background: #2a3a2e; color: var(--accent); }
    .dev-seg .icon { width: 20px; height: 20px; }

    /* ---------------- Cards ---------------- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card .row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: var(--surface2);
      object-fit: cover;
      flex-shrink: 0;
    }
    .avatar.sm {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    .meta { flex: 1; min-width: 0; }
    .name {
      font-weight: 650;
      font-size: 1.05rem;
      margin: 0 0 4px;
      word-break: break-word;
    }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
      margin-right: 4px;
    }
    .badge.working { color: #cfe4ff; background: #1a2e4a; }
    .badge.hand_raised { color: #ffe9b0; background: #3a2e10; }
    .badge.speaking { color: #c8ffe0; background: #163528; }
    .badge.idle { color: #c5c9d0; background: #2a2e36; }
    .badge.speaking.pulse { animation: pulse 1.3s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
    .chips { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
    }
    .chip.raised { color: #ffe9b0; }
    .chip.muted { color: #fca5a5; }
    .waiting {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }
    .waiting em { color: #cbd0d6; font-style: italic; }

    .karaoke {
      line-height: 1.55;
      font-size: 0.98rem;
      color: var(--muted);
      word-break: break-word;
    }
    .karaoke .w.on { color: var(--karaoke); font-weight: 650; }
    .karaoke .w.past { color: var(--text); }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .card-actions .grow { flex: 1; }
    .read-update .sub {
      display: block;
      font-weight: 500;
      font-size: 0.72rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ---------------- Reply ---------------- */
    .reply-box {
      margin-top: 10px;
    }
    .reply-box[hidden] { display: none; }
    .reply-input {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .reply-input:focus { outline: none; border-color: var(--accent); }
    .reply-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .reply-actions button { min-height: 40px; }
    .reply-hint {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ---------------- Messages ---------------- */
    .messages { margin-top: 8px; margin-bottom: 8px; }
    .messages-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .messages-header h2 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 650;
      letter-spacing: -0.01em;
      flex: 1;
    }
    .messages-header button {
      min-height: 36px;
      padding: 6px 12px;
      font-size: 0.82rem;
    }
    /* Inline clear confirm (§C5) */
    .clear-confirm {
      margin-bottom: 10px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .clear-confirm-text {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .clear-confirm-actions { display: flex; gap: 8px; }
    .clear-confirm-actions button { min-height: 40px; flex: 1; }
    .msg-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-weight: 500;
      min-height: 56px;
    }
    .msg-row.playing {
      border-color: #3a5a42;
      background: #151c18;
    }
    .msg-body { flex: 1; min-width: 0; }
    .msg-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    .msg-name {
      font-weight: 650;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-ago {
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: auto;
    }
    .msg-preview {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .unheard {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .unheard.hidden { visibility: hidden; }

    /* ---------------- New-message pill ---------------- */
    #new-pill {
      display: none;
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(var(--player-h) + env(safe-area-inset-bottom) + 8px);
      z-index: 26;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #2a3a2e;
      border: 1px solid #3a5a42;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      white-space: nowrap;
    }
    #new-pill.on { display: inline-flex; align-items: center; gap: 6px; }
    body.player-hidden #new-pill {
      bottom: calc(16px + env(safe-area-inset-bottom));
    }

    /* ---------------- Mini player ---------------- */
    #mini {
      display: none;
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 25;
      align-items: center;
      gap: 10px;
      background: #12151c;
      border-top: 1px solid var(--border);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 28px rgba(0,0,0,0.4);
    }
    #mini.on { display: flex; }
    .mini-tap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      padding: 0;
      text-align: left;
    }
    .mini-body { flex: 1; min-width: 0; }
    .mini-name {
      font-size: 0.9rem;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-sub {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
    }
    .mini-progress {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--surface2);
      pointer-events: none;
    }
    .mini-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
    }
    .mini-device {
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .mini-device.mac { color: var(--accent); }
    .mini-device .icon { width: 16px; height: 16px; }
    .mini-preview {
      font-size: 0.78rem;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }
    #mini-pp {
      flex-shrink: 0;
      min-width: 48px;
      min-height: 48px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #0d1a12;
    }
    #mini-pp .icon { width: 22px; height: 22px; }

    /* ---------------- Expanded player ---------------- */
    #expanded {
      position: fixed;
      inset: 0;
      z-index: 45;
      background: #12151c;
      display: flex;
      flex-direction: column;
      padding: 8px 18px calc(18px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      overflow-y: auto;
      will-change: transform;
    }
    #expanded.open { transform: translateY(0); }
    .exp-grab {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin: 6px auto 4px;
      flex-shrink: 0;
    }
    .exp-collapse {
      align-self: flex-start;
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 0 6px;
    }
    .exp-avatar {
      width: min(42vw, 176px);
      height: min(42vw, 176px);
      border-radius: 20px;
      object-fit: cover;
      background: var(--surface2);
      margin: 4px auto 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .exp-name {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .exp-status {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
    }
    /* Transcript | Message tab toggle (§C3) */
    .exp-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: center;
    }
    .exp-tab {
      min-height: 40px;
      padding: 8px 18px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .exp-tab.active { border-color: var(--accent); color: var(--text); }
    .exp-content {
      flex: 0 1 auto;
      margin-bottom: 16px;
      max-height: 30vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    #exp-message {
      line-height: 1.55;
      font-size: 0.95rem;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .exp-device-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .seg {
      min-height: 44px;
      padding: 8px 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }
    .seg .icon { width: 18px; height: 18px; }
    .seg.active { border-color: var(--accent); color: var(--text); }
    .seg.active.source-mac { border-color: var(--speaking); color: var(--speaking); }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .time {
      font-size: 0.7rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 34px;
    }
    .time.end { text-align: right; }
    .progress {
      flex: 1;
      height: 28px;
      display: flex;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .progress.seekable { cursor: pointer; }
    .progress-track {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      position: relative;
      overflow: hidden;
      pointer-events: none;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
    }
    .player-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    /* Ghost/borderless transport icon buttons (§C1) */
    .player-controls button {
      min-width: 52px;
      min-height: 52px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--text);
    }
    .player-controls button:disabled { color: var(--muted); opacity: 0.4; }
    .player-controls button .icon { width: 26px; height: 26px; }
    /* Only the central play/pause is a filled accent circle (Spotify) */
    .player-controls #btn-pp {
      min-width: 64px;
      min-height: 64px;
      background: var(--accent);
      color: #0d1a12;
    }
    .player-controls #btn-pp .icon { width: 30px; height: 30px; }
    #exp-reply-wrap { margin-top: auto; }

    /* ---------------- Session picker ---------------- */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 48;
      background: rgba(0,0,0,0.5);
    }
    .backdrop[hidden] { display: none; }
    .picker-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 49;
      background: #151820;
      border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      padding: 14px 16px calc(18px + env(safe-area-inset-bottom));
      max-height: 82vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    body.picker-open { overflow: hidden; }
    .picker-sheet.open { transform: translateY(0); }
    .picker-sheet[hidden] { display: none; }
    .picker-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab {
      flex: 1;
      min-height: 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-weight: 600;
    }
    .tab.active { background: #2a3a2e; border-color: #3a5a42; color: #d4ffe4; }
    .picker-section-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 4px 0 8px;
    }
    #picker-personas {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }
    /* Avatar-image persona chips (§C6) */
    .persona-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 2px;
      background: transparent;
      border: none;
      color: var(--muted);
      width: 60px;
    }
    .persona-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface2);
      border: 2px solid transparent;
      box-sizing: content-box;
    }
    .persona-chip.active .persona-avatar { border-color: var(--accent); }
    .persona-chip.active { color: var(--text); }
    .persona-cap {
      font-size: 0.7rem;
      font-weight: 600;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .picker-row {
      display: block;
      width: 100%;
      text-align: left;
      min-height: 56px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .picker-row-label { font-weight: 650; font-size: 0.92rem; word-break: break-word; }
    .picker-row-sub { font-size: 0.76rem; color: var(--muted); word-break: break-all; }

    /* ---------------- Toast ---------------- */
    #toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--player-h) + env(safe-area-inset-bottom) + 12px);
      transform: translateX(-50%);
      max-width: 90vw;
      background: #2a2e36;
      color: var(--text);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 60;
      text-align: center;
    }
    body.player-hidden #toast {
      bottom: calc(28px + env(safe-area-inset-bottom));
    }
    #toast.show { opacity: 1; }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 32px 12px;
    }
    .messages .empty { padding: 16px 12px; font-size: 0.9rem; }

    [hidden] { display: none !important; }
