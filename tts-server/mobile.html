<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- interactive-widget: Android Chrome shrinks the layout viewport when the
       keyboard opens, so the fixed sheet's composer stays visible above it. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Room of Devs</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #1a1d24;
      --surface2: #242830;
      --border: #2e3340;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --working: #4a9eff;
      --hand: #e6a817;
      --speaking: #3ecf8e;
      --idle: #6b7280;
      --danger: #ef4444;
      --amber: #e6a817;
      --karaoke: #ffe566;
      --accent: #3ecf8e;
      --player-h: 76px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100%;
    }
    body {
      padding: 12px 12px calc(var(--player-h) + env(safe-area-inset-bottom) + 16px);
    }
    body.player-hidden {
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    /* ---------------- Header ---------------- */
    header { margin-bottom: 14px; }
    .titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 650;
      margin: 0;
      letter-spacing: -0.02em;
      flex: 1 1 auto;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
    }
    .dot.live { background: var(--speaking); }
    .icon-btn {
      min-height: 44px;
      min-width: 44px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
    }
    .held-pill {
      display: block;
      width: 100%;
      margin-top: 10px;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #3a2e10;
      border: 1px solid #6a5820;
      color: #ffe0a0;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: left;
    }

    /* ---------------- Menus / popovers ---------------- */
    .menu {
      position: fixed;
      z-index: 40;
      background: #1c2029;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      min-width: 180px;
    }
    .menu-item {
      display: block;
      width: 100%;
      text-align: left;
      min-height: 44px;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 550;
    }
    .menu-item:active { background: var(--surface2); }

    button {
      min-height: 44px;
      min-width: 44px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 560;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.accent { background: #2a3a2e; border-color: #3a5a42; color: #d4ffe4; }
    button.ghost { background: transparent; border-color: var(--border); color: var(--muted); }

    /* ---------------- Icons (lucide-style inline SVG) ---------------- */
    .icon {
      width: 22px;
      height: 22px;
      display: inline-block;
      vertical-align: middle;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .icon.filled { fill: currentColor; stroke: none; }
    .icon.lg { width: 28px; height: 28px; }
    .icon.sm { width: 18px; height: 18px; }

    /* ---------------- Header device toggle (§A1) ---------------- */
    .dev-toggle {
      display: inline-flex;
      align-items: stretch;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }
    .dev-seg {
      min-width: 44px;
      min-height: 44px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 0;
      color: var(--muted);
    }
    .dev-seg + .dev-seg { border-left: 1px solid var(--border); }
    .dev-seg.active { background: #2a3a2e; color: var(--accent); }
    .dev-seg .icon { width: 20px; height: 20px; }

    /* ---------------- Cards ---------------- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card .row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: var(--surface2);
      object-fit: cover;
      flex-shrink: 0;
    }
    .avatar.sm {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
    .meta { flex: 1; min-width: 0; }
    .name {
      font-weight: 650;
      font-size: 1.05rem;
      margin: 0 0 4px;
      word-break: break-word;
    }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
      margin-right: 4px;
    }
    .badge.working { color: #cfe4ff; background: #1a2e4a; }
    .badge.hand_raised { color: #ffe9b0; background: #3a2e10; }
    .badge.speaking { color: #c8ffe0; background: #163528; }
    .badge.idle { color: #c5c9d0; background: #2a2e36; }
    .badge.speaking.pulse { animation: pulse 1.3s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
    .chips { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
    }
    .chip.raised { color: #ffe9b0; }
    .chip.muted { color: #fca5a5; }
    .waiting {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }
    .waiting em { color: #cbd0d6; font-style: italic; }

    .karaoke {
      line-height: 1.55;
      font-size: 0.98rem;
      color: var(--muted);
      word-break: break-word;
    }
    .karaoke .w.on { color: var(--karaoke); font-weight: 650; }
    .karaoke .w.past { color: var(--text); }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .card-actions .grow { flex: 1; }
    .read-update .sub {
      display: block;
      font-weight: 500;
      font-size: 0.72rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ---------------- Reply ---------------- */
    .reply-box {
      margin-top: 10px;
    }
    .reply-box[hidden] { display: none; }
    .reply-input {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .reply-input:focus { outline: none; border-color: var(--accent); }
    .reply-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .reply-actions button { min-height: 40px; }
    .reply-hint {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ---------------- Messages ---------------- */
    .messages { margin-top: 8px; margin-bottom: 8px; }
    .messages-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .messages-header h2 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 650;
      letter-spacing: -0.01em;
      flex: 1;
    }
    .messages-header button {
      min-height: 36px;
      padding: 6px 12px;
      font-size: 0.82rem;
    }
    /* Inline clear confirm (§C5) */
    .clear-confirm {
      margin-bottom: 10px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .clear-confirm-text {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .clear-confirm-actions { display: flex; gap: 8px; }
    .clear-confirm-actions button { min-height: 40px; flex: 1; }
    .msg-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-weight: 500;
      min-height: 56px;
    }
    .msg-row.playing {
      border-color: #3a5a42;
      background: #151c18;
    }
    .msg-body { flex: 1; min-width: 0; }
    .msg-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    .msg-name {
      font-weight: 650;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-ago {
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: auto;
    }
    .msg-preview {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .unheard {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .unheard.hidden { visibility: hidden; }

    /* ---------------- New-message pill ---------------- */
    #new-pill {
      display: none;
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(var(--player-h) + env(safe-area-inset-bottom) + 8px);
      z-index: 26;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #2a3a2e;
      border: 1px solid #3a5a42;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      white-space: nowrap;
    }
    #new-pill.on { display: inline-flex; align-items: center; gap: 6px; }
    body.player-hidden #new-pill {
      bottom: calc(16px + env(safe-area-inset-bottom));
    }

    /* ---------------- Mini player ---------------- */
    #mini {
      display: none;
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 25;
      align-items: center;
      gap: 10px;
      background: #12151c;
      border-top: 1px solid var(--border);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 28px rgba(0,0,0,0.4);
    }
    #mini.on { display: flex; }
    .mini-tap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      padding: 0;
      text-align: left;
    }
    .mini-body { flex: 1; min-width: 0; }
    .mini-name {
      font-size: 0.9rem;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-sub {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
    }
    .mini-progress {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--surface2);
      pointer-events: none;
    }
    .mini-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
    }
    .mini-device {
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .mini-device.mac { color: var(--accent); }
    .mini-device .icon { width: 16px; height: 16px; }
    .mini-preview {
      font-size: 0.78rem;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }
    #mini-pp {
      flex-shrink: 0;
      min-width: 48px;
      min-height: 48px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #0d1a12;
    }
    #mini-pp .icon { width: 22px; height: 22px; }

    /* ---------------- Expanded player ---------------- */
    #expanded {
      position: fixed;
      inset: 0;
      z-index: 45;
      background: #12151c;
      display: flex;
      flex-direction: column;
      padding: 8px 18px calc(18px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      overflow-y: auto;
      will-change: transform;
    }
    #expanded.open { transform: translateY(0); }
    .exp-grab {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin: 6px auto 4px;
      flex-shrink: 0;
    }
    .exp-collapse {
      align-self: flex-start;
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 0 6px;
    }
    .exp-avatar {
      width: min(42vw, 176px);
      height: min(42vw, 176px);
      border-radius: 20px;
      object-fit: cover;
      background: var(--surface2);
      margin: 4px auto 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .exp-name {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .exp-status {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
    }
    /* ── Conversation view v2 (chat + call) ── */
    #expanded.convo {
      overflow: hidden;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    #expanded.convo > .exp-grab { display: none; }
    #expanded.convo > .exp-collapse,
    #expanded.convo > .exp-avatar,
    #expanded.convo > .exp-name,
    #expanded.convo > .exp-status,
    #expanded.convo > .exp-tabs,
    #expanded.convo > .exp-content,
    #expanded.convo > .progress-row,
    #expanded.convo > .player-controls,
    #expanded.convo > .exp-device-row,
    #expanded.convo > #exp-reply-wrap { display: none !important; }
    /* Edge glow while LIVE */
    #expanded.convo.live-on::before {
      content: ""; position: absolute; top: 0; left: 16%; right: 16%; height: 2px;
      background: var(--accent); z-index: 30; pointer-events: none;
      box-shadow: 0 0 18px 3px rgba(62, 207, 142, 0.5);
      animation: cv-breathe 1.6s ease-in-out infinite;
    }
    #expanded.convo.live-on {
      border-color: #2a5a42;
      box-shadow: inset 0 0 0 1px rgba(62, 207, 142, 0.28);
    }
    @keyframes cv-breathe { 50% { opacity: 0.28; } }

    #cv-stage {
      display: none; flex: 1; min-height: 0; position: relative; overflow: hidden;
      background: #12151c;
    }
    #expanded.convo #cv-stage { display: block; }
    .cv-panel {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      will-change: transform;
    }
    .cv-panel-chat { transform: translateX(0); z-index: 2; }
    .cv-panel-call { transform: translateX(100%); z-index: 1; }
    #expanded.show-call .cv-panel-chat { transform: translateX(-100%); }
    #expanded.show-call .cv-panel-call { transform: translateX(0); }

    /* Live pin — mid-live chat only, one slim row */
    .cv-live-pin {
      display: none; align-items: center; gap: 8px; flex-shrink: 0;
      padding: 6px 12px; padding-top: calc(6px + env(safe-area-inset-top, 0px));
      border-bottom: 1px solid #1e3a2a; background: #0e1612;
    }
    #expanded.live-on:not(.show-call) .cv-live-pin { display: flex; }
    .cv-live-pin .back-call {
      min-height: 32px; min-width: 0; padding: 0 10px; border-radius: 999px;
      border: 1px solid #2a4a38; background: #151c18; color: #a8d4b8;
      font-size: 0.72rem; font-weight: 650;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .cv-live-pin .back-call .icon { width: 14px; height: 14px; }
    .cv-live-pin .pin-name {
      font-size: 0.72rem; font-weight: 650; color: #c8ffe0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .cv-live-pin .pin-timer {
      font-size: 0.7rem; color: #8fbf9e; font-variant-numeric: tabular-nums; font-weight: 600;
    }
    .cv-live-pin .spacer { flex: 1; }
    .cv-live-pin .hang {
      min-height: 32px; min-width: 0; padding: 0 12px; border-radius: 999px;
      border: 1px solid #5a3030; background: #2a1818; color: #fca5a5;
      font-size: 0.72rem; font-weight: 650;
    }

    /* Compact chat header (~56px) */
    .cv-chat-header {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      height: 56px; padding: 0 12px;
      border-bottom: 1px solid var(--border); background: #12151acc;
    }
    #expanded.live-on:not(.show-call) .cv-chat-header { display: none; }
    .cv-chat-av {
      width: 40px; height: 40px; border-radius: 11px; object-fit: cover;
      background: var(--surface2); flex-shrink: 0;
    }
    .cv-who { flex: 1; min-width: 0; }
    .cv-who .name {
      font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; margin: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cv-who .sub {
      font-size: 0.7rem; color: var(--muted); font-weight: 550; margin-top: 1px;
      display: flex; align-items: center; gap: 6px;
    }
    .cv-who .sub .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--idle); flex-shrink: 0;
    }
    .cv-who .sub .dot.ready { background: var(--accent); }
    .cv-who .sub .dot.working { background: var(--working); }
    .cv-who .sub .dot.live { background: var(--accent); animation: cv-breathe 1.2s infinite; }
    #exp-live-btn {
      display: none; align-items: center; gap: 6px; flex-shrink: 0;
      min-height: 36px; min-width: 0; padding: 0 12px 0 10px; border-radius: 999px;
      border: 1px solid #3a5a42; background: #151c18; color: #a8d4b8;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
    }
    #expanded.convo:not(.live-on) #exp-live-btn { display: inline-flex; }
    #exp-live-btn .orb {
      width: 7px; height: 7px; border-radius: 50%; background: #3a5a42;
    }
    #exp-live-btn.armed {
      background: #163528; border-color: var(--accent); color: #c8ffe0;
      box-shadow: 0 0 14px rgba(62, 207, 142, 0.22);
    }
    #exp-live-btn.armed .orb {
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: cv-breathe 1.2s infinite;
    }
    .cv-collapse {
      width: 34px; height: 38px; min-width: 34px; min-height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border: none; background: transparent; color: var(--muted); padding: 0; flex-shrink: 0;
    }
    .cv-collapse .icon { width: 22px; height: 22px; }

    #exp-thread {
      flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain;
      padding: 12px 14px 8px; display: flex; flex-direction: column; gap: 9px;
    }
    .cv-bubble {
      max-width: 86%; border-radius: 14px; padding: 9px 12px;
      font-size: 0.9rem; line-height: 1.45; word-break: break-word;
      border: 1px solid var(--border);
    }
    .cv-agent {
      background: var(--surface); align-self: flex-start; border-bottom-left-radius: 5px;
    }
    .cv-me {
      background: #1f3d33; border-color: transparent;
      align-self: flex-end; border-bottom-right-radius: 5px;
    }
    .cv-dim { opacity: 0.72; font-size: 0.84rem; }
    .cv-bubble .cv-meta {
      display: flex; align-items: center; gap: 8px; margin-top: 7px;
      color: var(--muted); font-size: 0.72rem;
    }
    .cv-play {
      min-width: 28px; min-height: 28px; padding: 3px 9px 3px 6px; border-radius: 999px;
      border: 1px solid #3a5a42; background: #2a3a2e; color: #d4ffe4;
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.68rem; font-weight: 650;
    }
    .cv-play .icon { width: 12px; height: 12px; }
    .cv-ack {
      align-self: flex-end; display: flex; align-items: center; gap: 7px;
      color: var(--muted); font-size: 0.78rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px;
    }
    .cv-working {
      align-self: flex-start; color: var(--muted); font-size: 0.84rem;
      padding: 2px 4px; display: flex; flex-direction: column; gap: 2px;
    }
    .cv-working .cv-hint { color: var(--idle); font-size: 0.72rem; }
    .cv-dots i { animation: cv-breathe 1.4s infinite; font-style: normal; }
    .cv-dots i:nth-child(2) { animation-delay: 0.2s; }
    .cv-dots i:nth-child(3) { animation-delay: 0.4s; }

    /* B1 playback strip — hidden unless playing */
    .cv-playback-strip {
      display: none; align-items: center; gap: 10px; flex-shrink: 0;
      margin: 0 12px 8px; padding: 8px 10px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    }
    .cv-playback-strip.show { display: flex; }
    .cv-playback-strip .pp {
      width: 32px; height: 32px; min-width: 32px; min-height: 32px;
      border-radius: 50%; border: none; padding: 0;
      background: var(--accent); color: #0d1a12;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .cv-playback-strip .pp .icon { width: 14px; height: 14px; }
    .cv-playback-strip .karaoke-line {
      flex: 1; min-width: 0; overflow-x: auto; white-space: nowrap;
      font-size: 0.78rem; line-height: 1.35; color: var(--muted);
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .cv-playback-strip .karaoke-line::-webkit-scrollbar { display: none; }
    .cv-playback-strip .karaoke-line .w { color: var(--muted); }
    .cv-playback-strip .karaoke-line .w.past { color: var(--text); }
    .cv-playback-strip .karaoke-line .w.on {
      color: var(--karaoke); font-weight: 650;
    }
    .cv-playback-strip .stop {
      width: 32px; height: 32px; min-width: 32px; min-height: 32px;
      border-radius: 50%; border: 1px solid var(--border); padding: 0;
      background: transparent; color: var(--muted);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .cv-playback-strip .stop .icon { width: 16px; height: 16px; }

    /* In-shell composer (gpt) */
    .cv-composer {
      flex-shrink: 0; border-top: 1px solid var(--border);
      padding: 8px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      background: #12151a;
    }
    .cv-compose-shell {
      display: flex; align-items: flex-end; gap: 5px;
      padding: 4px 4px 4px 12px; border: 1px solid var(--border);
      border-radius: 18px; background: var(--surface);
    }
    .cv-compose-shell textarea {
      flex: 1; height: 34px; min-height: 34px; max-height: 88px; resize: none;
      border: 0; outline: 0; padding: 8px 0; background: transparent;
      color: var(--text); font-size: 0.88rem; font-family: inherit; line-height: 18px;
    }
    .cv-compose-shell textarea::placeholder { color: #727982; }
    .cv-compose-shell .send {
      width: 34px; height: 34px; min-width: 34px; min-height: 34px;
      border: 0; border-radius: 50%; padding: 0;
      background: var(--accent); color: #092016;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .cv-compose-shell .send .icon { width: 16px; height: 16px; }

    /* ===== Call view ===== */
    .cv-call {
      flex: 1; display: flex; flex-direction: column; min-height: 0;
      background: radial-gradient(ellipse at 50% 28%, #1a2420 0%, #12151c 55%);
      padding-top: env(safe-area-inset-top, 0px);
    }
    .cv-call-top {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 16px 0; flex-shrink: 0; gap: 10px;
    }
    .cv-name-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px 6px 6px; border-radius: 999px;
      background: rgba(26, 29, 36, 0.85); border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .cv-name-chip img {
      width: 26px; height: 26px; border-radius: 7px; object-fit: cover; background: #2a3440;
    }
    .cv-name-chip strong { font-size: 0.85rem; font-weight: 700; }
    .cv-name-chip .credits {
      font-size: 0.65rem; font-weight: 650; color: #8fbf9e;
      padding: 2px 7px; border-radius: 999px; background: #163528;
      border: 1px solid #2a4a38; margin-left: 2px;
    }
    .cv-presence {
      width: 120px; height: 120px; border-radius: 28px; margin-top: 14px;
      object-fit: cover; background: linear-gradient(145deg, #2a3440, #1a222c 55%, #3a2a48);
      box-shadow:
        0 0 0 3px #12151c,
        0 0 0 5px rgba(62, 207, 142, 0.45),
        0 12px 40px rgba(0, 0, 0, 0.35);
      animation: cv-presence-pulse 2.4s ease-in-out infinite;
    }
    .cv-presence.working-ring {
      box-shadow:
        0 0 0 3px #12151c,
        0 0 0 5px rgba(74, 158, 255, 0.5),
        0 12px 40px rgba(0, 0, 0, 0.35);
      animation: none;
    }
    .cv-presence.final-ring {
      box-shadow:
        0 0 0 3px #12151c,
        0 0 0 5px rgba(62, 207, 142, 0.7),
        0 12px 40px rgba(62, 207, 142, 0.15);
      animation: none;
    }
    @keyframes cv-presence-pulse {
      0%, 100% { box-shadow: 0 0 0 3px #12151c, 0 0 0 5px rgba(62, 207, 142, 0.35), 0 12px 40px rgba(0, 0, 0, 0.35); }
      50% { box-shadow: 0 0 0 3px #12151c, 0 0 0 7px rgba(62, 207, 142, 0.55), 0 12px 40px rgba(0, 0, 0, 0.35); }
    }
    .cv-call-body {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 12px 22px; min-height: 0;
    }
    .cv-info-card {
      width: 100%; max-width: 320px; border-radius: 18px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 16px 16px 14px;
    }
    .cv-info-card .tag {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .cv-info-card .tag.speaking { color: var(--accent); }
    .cv-info-card .tag.final { color: #8fbf9e; }
    .cv-info-card .tag.working { color: #9ec5ff; }
    .cv-info-card .tag.done { color: #8fbf9e; }
    .cv-info-card .body {
      font-size: 0.95rem; line-height: 1.5; color: var(--text); word-break: break-word;
      /* Long finals must never push the dock off-screen — cap and scroll. */
      max-height: 38vh; overflow-y: auto; overscroll-behavior: contain;
    }
    .cv-info-card .body.dim { color: var(--muted); }
    .cv-info-card .speaking-words .w { color: var(--muted); }
    .cv-info-card .speaking-words .w.past { color: var(--text); }
    .cv-info-card .speaking-words .w.on { color: var(--karaoke); font-weight: 650; }
    .cv-info-card .activity-row {
      display: flex; align-items: center; gap: 8px; color: #9ec5ff; font-size: 0.88rem;
    }
    .cv-info-card .tool-count {
      margin-top: 8px; font-size: 0.72rem; color: var(--muted);
    }
    .cv-call-dock {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px calc(18px + env(safe-area-inset-bottom, 0px)); gap: 16px;
    }
    .cv-call-dock .end {
      width: 56px; height: 56px; min-width: 56px; min-height: 56px;
      border-radius: 50%; border: none; padding: 0;
      background: var(--danger); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.35);
    }
    .cv-call-dock .end .icon { width: 24px; height: 24px; }
    .cv-call-dock .timer-block { text-align: center; flex: 1; }
    .cv-call-dock .timer-block .t {
      font-size: 0.95rem; font-weight: 650; font-variant-numeric: tabular-nums;
      color: var(--text); letter-spacing: 0.02em;
    }
    .cv-call-dock .timer-block .hint {
      font-size: 0.65rem; color: var(--muted); margin-top: 2px;
    }
    .cv-call-dock .msg {
      width: 56px; height: 56px; min-width: 56px; min-height: 56px;
      border-radius: 50%; border: 1px solid var(--border); padding: 0;
      background: var(--surface2); color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .cv-call-dock .msg .icon { width: 22px; height: 22px; }
    @media (prefers-reduced-motion: reduce) {
      .cv-panel { transition: none !important; }
    }
    /* Transcript | Message tab toggle (§C3) */
    .exp-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: center;
    }
    .exp-tab {
      min-height: 40px;
      padding: 8px 18px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .exp-tab.active { border-color: var(--accent); color: var(--text); }
    .exp-content {
      flex: 0 1 auto;
      margin-bottom: 16px;
      max-height: 30vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    #exp-message {
      line-height: 1.55;
      font-size: 0.95rem;
      color: var(--text);
      word-break: break-word;
    }
    #exp-message p { margin: 0 0 0.7em; }
    #exp-message .md-h { margin: 0.9em 0 0.4em; font-weight: 700; font-size: 1.02rem; }
    #exp-message ul, #exp-message ol { margin: 0 0 0.7em; padding-left: 1.3em; }
    #exp-message li { margin-bottom: 0.25em; }
    #exp-message code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85em;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 1px 5px;
    }
    #exp-message pre {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0 0 0.7em;
    }
    #exp-message pre code { background: none; padding: 0; white-space: pre; }
    #exp-message a { color: var(--accent); }
    .exp-device-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .seg {
      min-height: 44px;
      padding: 8px 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }
    .seg .icon { width: 18px; height: 18px; }
    .seg.active { border-color: var(--accent); color: var(--text); }
    .seg.active.source-mac { border-color: var(--speaking); color: var(--speaking); }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .time {
      font-size: 0.7rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 34px;
    }
    .time.end { text-align: right; }
    .progress {
      flex: 1;
      height: 28px;
      display: flex;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .progress.seekable { cursor: pointer; }
    .progress-track {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      position: relative;
      overflow: hidden;
      pointer-events: none;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
    }
    /* 5 equal slots keep the play/pause circle dead-center of the screen
       (2 buttons left, 2 slots right) — flex centered the GROUP, not the
       play button, so it sat visibly off-center. */
    .player-controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto 1fr 1fr;
      justify-items: center;
      align-items: center;
      margin-bottom: 16px;
    }
    /* Hidden transport buttons keep their grid cell so the layout stays
       balanced (the class rule below outspecifies the UA [hidden] rule). */
    .player-controls button[hidden] {
      display: inline-flex;
      visibility: hidden;
    }
    /* Ghost/borderless transport icon buttons (§C1) */
    .player-controls button {
      min-width: 52px;
      min-height: 52px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--text);
    }
    .player-controls button:disabled { color: var(--muted); opacity: 0.4; }
    /* display:block kills the inline-baseline drop that made icons sit low */
    .player-controls button .icon { width: 26px; height: 26px; display: block; }
    /* Speed cycle button: text label in the old restart slot */
    .player-controls .speed-label {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }
    /* Optical centering: the play triangle reads left-heavy in a circle */
    .player-controls use[href="#i-play"], #mini-pp use[href="#i-play"] { transform: translateX(1.5px); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon.spin { animation: spin 0.8s linear infinite; transform-origin: center; }
    /* Only the central play/pause is a filled accent circle (Spotify) */
    .player-controls #btn-pp {
      min-width: 64px;
      min-height: 64px;
      background: var(--accent);
      color: #0d1a12;
    }
    .player-controls #btn-pp .icon { width: 30px; height: 30px; }
    #exp-reply-wrap { margin-top: auto; }

    /* ---------------- Session picker ---------------- */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 48;
      background: rgba(0,0,0,0.5);
    }
    .backdrop[hidden] { display: none; }
    .picker-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 49;
      background: #151820;
      border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      padding: 14px 16px calc(18px + env(safe-area-inset-bottom));
      max-height: 82vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    body.picker-open { overflow: hidden; }
    .picker-sheet.open { transform: translateY(0); }
    .picker-sheet[hidden] { display: none; }
    .picker-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab {
      flex: 1;
      min-height: 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-weight: 600;
    }
    .tab.active { background: #2a3a2e; border-color: #3a5a42; color: #d4ffe4; }
    .picker-section-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 4px 0 8px;
    }
    .picker-flags {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .picker-flag {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text);
    }
    .picker-flag input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    .picker-flag select {
      flex: 1;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 0.9rem;
    }
    #picker-personas {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }
    /* Avatar-image persona chips (§C6) */
    .persona-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-height: 44px;
      padding: 2px;
      background: transparent;
      border: none;
      color: var(--muted);
      width: 60px;
    }
    .persona-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface2);
      border: 2px solid transparent;
      box-sizing: content-box;
    }
    .persona-chip.active .persona-avatar { border-color: var(--accent); }
    .persona-chip.active { color: var(--text); }
    .persona-cap {
      font-size: 0.7rem;
      font-weight: 600;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .picker-row {
      display: block;
      width: 100%;
      text-align: left;
      min-height: 56px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .picker-row-label { font-weight: 650; font-size: 0.92rem; word-break: break-word; }
    .picker-row-sub { font-size: 0.76rem; color: var(--muted); word-break: break-all; }

    /* ---------------- Toast ---------------- */
    #toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--player-h) + env(safe-area-inset-bottom) + 12px);
      transform: translateX(-50%);
      max-width: 90vw;
      background: #2a2e36;
      color: var(--text);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 60;
      text-align: center;
    }
    body.player-hidden #toast {
      bottom: calc(28px + env(safe-area-inset-bottom));
    }
    #toast.show { opacity: 1; }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 32px 12px;
    }
    .messages .empty { padding: 16px 12px; font-size: 0.9rem; }

    [hidden] { display: none !important; }

    /* ---------------- Hidden devs (preserved) ---------------- */
    .card-member-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .btn-hide-dev {
      flex: 0 0 auto;
      min-width: 44px;
      min-height: 44px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 560;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-hide-dev:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .hidden-devs { margin: -4px 0 14px; }
    .hidden-devs:not([hidden]) { display: block; }
    .hidden-devs-toggle {
      display: block;
      width: 100%;
      min-height: 44px;
      text-align: left;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 560;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .hidden-devs-toggle::after {
      content: "▾";
      float: right;
      transition: transform 0.15s ease;
    }
    .hidden-devs-toggle[aria-expanded="true"]::after {
      transform: rotate(180deg);
    }
    .hidden-devs-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 8px;
    }
    .hidden-devs-list[hidden] { display: none; }
    .hidden-dev-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
    }
    .hidden-dev-row + .hidden-dev-row {
      border-top: 1px solid var(--border);
    }
    .hidden-dev-identity { flex: 1; min-width: 0; }
    .hidden-dev-label { font-weight: 650; word-break: break-word; }
    .hidden-dev-name { font-size: 0.8rem; color: var(--muted); word-break: break-word; }
    .btn-show-dev { flex: 0 0 auto; min-width: 44px; min-height: 44px; }
  </style>
</head>

  <script>
(() => {
  const $ = (id) => document.getElementById(id);
  const SILENT_WAV = "data:audio/wav;base64,UklGRjQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YRAAAAAAAAAAAAAAAAAAAAAAAAAA";

  const conn = $("conn");
  const members = $("members");
  const messagesEl = $("messages");
  const audio = $("audio");
  const toastEl = $("toast");
  const mini = $("mini");
  const miniAvatar = $("mini-avatar");
  const miniName = $("mini-name");
  const miniDevice = $("mini-device");
  const miniPreview = $("mini-preview");
  const miniPp = $("mini-pp");
  const expanded = $("expanded");
  const expAvatar = $("exp-avatar");
  const expName = $("exp-name");
  const expKaraoke = $("exp-karaoke");
  const expDeviceRow = $("exp-device-row");
  const expReplyWrap = $("exp-reply-wrap");
  const progressFill = $("progress-fill");
  const btnClear = $("btn-clear");
  const newPill = $("new-pill");
  const btnPp = $("btn-pp");
  const btnPrev = $("btn-prev");
  const btnNext = $("btn-next");
  const btnStop = $("btn-stop");
  const hiddenDevs = $("hidden-devs");
  const btnHiddenDevs = $("btn-hidden-devs");
  const hiddenDevsList = $("hidden-devs-list");
  const overflowMenu = $("overflow-menu");
  const heldPill = $("held-pill");
  const picker = $("picker");
  const pickerBackdrop = $("picker-backdrop");
  const pickerPersonas = $("picker-personas");
  const pickerList = $("picker-list");
  const miniProgressFill = $("mini-progress-fill");
  const expMessage = $("exp-message");
  const expKaraokeEl = $("exp-karaoke");
  const expStatus = $("exp-status");
  const expTabs = $("exp-tabs");
  const btnSpeed = $("btn-speed");
  const headerDevice = $("header-device");
  const miCatchup = $("mi-catchup");
  const clearConfirm = $("clear-confirm");

  const LISTENED_KEY = "mobile_listened_files";
  const CLEARED_KEY = "mobile_cleared_files";
  const HIDDEN_DEVS_KEY = "mobile_hidden_dev_names_v1";
  const OUTPUT_KEY = "mobile_output_device";
  const SPEED_KEY = "mobile_speed_mult";
  const INITIAL_HIDDEN_DEV_NAMES = ["job-search-2026"];

  let snapshot = { agents: [], nowPlaying: null, roomHeld: false, paused: false };
  let charactersPayload = { characters: {}, sessionVoices: {} };
  let karaokeTimer = null;
  let toastTimer = null;
  let allReplayList = [];
  let replayList = [];

  // Phone replay track state (the phone <audio> plane).
  let phoneMeta = null;        // current/last replay entry loaded into <audio>
  let currentIndex = -1;
  let phonePendingTap = false; // file loaded but autoplay rejected — needs a tap
  let audioUnlocked = false;
  let lastPhonePauseAt = 0;    // remembered position when mac-live pre-empted us

  // Expanded player: Transcript | Message tab (§C3).
  let expTab = "transcript";
  // Seek to apply once a freshly-loaded replay reports its duration.
  let pendingSeekSec = 0;
  // Live handoff (§A3): awaiting the mac→phone replay record after a stop.
  let handoffAwait = null;     // { offsetSec, sessionId, startedAt, character, name }
  let handoffTimer = null;
  // Mac pause/seek without SIGSTOP (v2.2): once replayFile exists, pause =
  // stop + remember position; resume/seek = play_replay at offset. Kills the
  // audio-stutter "seizure" SIGSTOP causes in ffplay.
  let macPaused = null;        // { file, offsetSec, np }
  let macActionPending = false; // stop/play_replay round-trip in flight
  let macScrubbing = false;    // dragging the progress bar in a mac state
  let phoneLoading = false;    // replay file loading into <audio>
  let phoneLoadGen = 0;        // generation counter — stale play() rejections
  const grantPending = new Map(); // sessionId → timeout id ("Working…" state)

  // Live grant streaming (v2.3): while synthesis is in flight the phone plays
  // /live-audio/ (chunked radio-stream tail of the growing replay file). The
  // stream ends at the edge of what's on disk — reconnect from a byte offset
  // instead of treating it as track end.
  let liveMode = false;        // <audio> src is /live-audio/
  let liveComplete = false;    // server re-stamped synthesisComplete:true
  let liveBaseSec = 0;         // seconds consumed by previous live connections
  let liveNp = null;           // latest nowPlaying frame for the live file
  let liveRetries = 0;         // consecutive edge-reconnects without progress
  let liveProgressWall = 0;    // wall-clock of last live timeupdate (watchdog)
  const LIVE_BYTES_PER_SEC = 16000; // mp3_44100_128 is CBR 128kbps

  // Playback-speed multiplier (v2.3): applied on top of the entry's baked
  // residual rate; phone static playback only (live streams can't sustain >1×).
  const SPEED_STEPS = [1, 1.25, 1.5, 1.75, 2];
  let speedMult = (() => {
    const v = parseFloat(localStorage.getItem(SPEED_KEY) || "1");
    return SPEED_STEPS.includes(v) ? v : 1;
  })();

  // Inline SVG icon markup for template strings.
  function iconHtml(id, extra) {
    return `<svg class="icon${extra ? " " + extra : ""}" aria-hidden="true"><use href="#i-${id}"/></svg>`;
  }

  // Catch-up / messages
  let catchUpMode = false;
  let catchUpQueue = [];

  // SSE / new-message detection
  let lastNowPlayingKey = null;
  let knownFiles = new Set();
  let pendingNewEntry = null;

  // Output preference (§1)
  function loadOutput() {
    try {
      const v = localStorage.getItem(OUTPUT_KEY);
      return v === "phone" ? "phone" : "mac";
    } catch {
      return "mac";
    }
  }
  let outputPref = loadOutput();
  function setOutput(v) {
    outputPref = v === "phone" ? "phone" : "mac";
    try { localStorage.setItem(OUTPUT_KEY, outputPref); } catch { /* quota */ }
    renderHeaderDevice();
    renderMembers();
    renderExpandedChrome();
  }
  function renderHeaderDevice() {
    for (const seg of headerDevice.querySelectorAll(".dev-seg")) {
      seg.classList.toggle("active", seg.getAttribute("data-device") === outputPref);
    }
  }

  // Reply drafts survive member re-renders (Wispr Flow keyboard needs a stable field).
  const replyDrafts = {};
  let openReplySession = null;

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2400);
  }

  /* --------------- localStorage sets --------------- */
  function loadStrSet(key) {
    try {
      const raw = localStorage.getItem(key);
      const arr = raw ? JSON.parse(raw) : [];
      return new Set(Array.isArray(arr) ? arr : []);
    } catch {
      return new Set();
    }
  }
  function saveStrSet(key, set) {
    try {
      localStorage.setItem(key, JSON.stringify([...set]));
    } catch {
      /* quota */
    }
  }

  let listened = loadStrSet(LISTENED_KEY);
  let clearedFiles = loadStrSet(CLEARED_KEY);

  function pruneAgainst(set, key, list) {
    const files = new Set((list || []).map((e) => e.file).filter(Boolean));
    let changed = false;
    for (const f of [...set]) {
      if (!files.has(f)) {
        set.delete(f);
        changed = true;
      }
    }
    if (changed) saveStrSet(key, set);
  }

  function markListened(file) {
    if (!file || listened.has(file)) return;
    listened.add(file);
    saveStrSet(LISTENED_KEY, listened);
    renderMessages();
    updateBars();
  }

  /* --------------- Hidden devs (preserved) --------------- */
  function loadHiddenDevNames() {
    const seed = () => {
      const set = new Set(INITIAL_HIDDEN_DEV_NAMES);
      try {
        localStorage.setItem(HIDDEN_DEVS_KEY, JSON.stringify([...set].sort()));
      } catch { /* ignore quota */ }
      return set;
    };
    let raw;
    try {
      raw = localStorage.getItem(HIDDEN_DEVS_KEY);
    } catch {
      return new Set(INITIAL_HIDDEN_DEV_NAMES);
    }
    if (raw === null) return seed();
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch {
      return seed();
    }
    if (!Array.isArray(parsed)) return seed();
    const norm = parsed
      .filter((v) => typeof v === "string")
      .map((v) => v.trim())
      .filter(Boolean);
    const set = new Set(norm);
    if (norm.length !== parsed.length || set.size !== norm.length) {
      try {
        localStorage.setItem(HIDDEN_DEVS_KEY, JSON.stringify([...set].sort()));
      } catch { /* keep in-memory set */ }
    }
    return set;
  }
  function saveHiddenDevNames() {
    try {
      localStorage.setItem(HIDDEN_DEVS_KEY, JSON.stringify([...hiddenDevNames].sort()));
      return true;
    } catch {
      toast("Could not save hidden devs");
      return false;
    }
  }
  let hiddenDevNames = loadHiddenDevNames();

  function isHiddenDevName(name) {
    const n = String(name || "").trim();
    return !!n && hiddenDevNames.has(n);
  }
  function agentRawName(agent) {
    return String(agent?.name || "").trim();
  }
  function agentForSession(sessionId) {
    return (snapshot.agents || []).find((a) => a.sessionId === sessionId);
  }
  function entryRawName(entry) {
    const sn = String(entry?.sessionName || "").trim();
    if (sn) return sn;
    return agentRawName(agentForSession(entry?.sessionId));
  }
  function isReplayEntryHidden(entry) {
    return isHiddenDevName(entryRawName(entry));
  }
  function visibleAgents() {
    return (snapshot.agents || []).filter((a) => !isHiddenDevName(agentRawName(a)));
  }
  function isInjectable(agent) {
    // Server contract: agent.injectable. Degrade to isTeam until it ships.
    if (typeof agent?.injectable === "boolean") return agent.injectable;
    return !!agent?.isTeam;
  }

  /* --------------- helpers --------------- */
  async function postAction(body) {
    try {
      const res = await fetch("/action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) return null;
      try { return await res.json(); } catch { return {}; }
    } catch {
      return null;
    }
  }

  function setImg(el, src) {
    // Avoid reassigning identical src (would re-decode / flicker on every tick).
    if (el.getAttribute("src") !== src) el.src = src;
  }

  function escapeHtml(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function avatarDir(agent) {
    if (agent.character) return String(agent.character).toLowerCase();
    const voices = charactersPayload.sessionVoices || {};
    const chars = charactersPayload.characters || {};
    const voiceId = voices[agent.sessionId];
    if (voiceId && chars[voiceId]?.name) {
      return String(chars[voiceId].name).toLowerCase();
    }
    return "default";
  }
  function avatarSrc(character, frame) {
    return `/avatars/tmnt/${encodeURIComponent(character)}/${frame}.png`;
  }
  function entryCharacter(entry) {
    if (entry?.character) return String(entry.character).toLowerCase();
    if (entry?.sessionId) {
      const agent = agentForSession(entry.sessionId);
      if (agent) return avatarDir(agent);
    }
    return "default";
  }
  function entryName(entry) {
    if (entry?.sessionName) {
      const a = (snapshot.agents || []).find((x) => agentRawName(x) === entry.sessionName);
      if (a) return a.label || a.name || entry.sessionName;
      return entry.sessionName;
    }
    if (entry?.sessionId) {
      const agent = agentForSession(entry.sessionId);
      if (agent) return agent.label || agent.name || entry.sessionId.slice(0, 8);
    }
    return entry?.character || "Unknown";
  }
  function entryPreview(entry) {
    const t = entry?.textPreview || entry?.spokenText || "";
    return t.length > 90 ? t.slice(0, 90) + "…" : t;
  }
  function timeAgo(ts) {
    if (!ts) return "";
    const t = Date.parse(ts);
    if (!Number.isFinite(t)) return "";
    const sec = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (sec < 60) return `${sec}s ago`;
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min}m ago`;
    const hr = Math.floor(min / 60);
    if (hr < 48) return `${hr}h ago`;
    return `${Math.floor(hr / 24)}d ago`;
  }
  function fmtTime(sec) {
    if (!Number.isFinite(sec) || sec < 0) return "0:00";
    const s = Math.floor(sec);
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${m}:${r < 10 ? "0" : ""}${r}`;
  }

  /* ============================================================
     §0  PLAYER STATE MODEL
     ============================================================ */
  function isNowPlayingActive(np) {
    return !!(np && !np.endedAt && np.kind !== "ack" && np.text);
  }

  // The one discriminated state that drives ALL player chrome.
  function computePlayerState() {
    const np = snapshot.nowPlaying;
    const active = isNowPlayingActive(np);
    // Mac speaking through its own speakers → mac-live owns the player.
    if (active && np.output !== "phone") {
      // A genuinely new playback supersedes a remembered Mac pause. (Our own
      // resume also lands here — by then macPaused is already cleared.)
      if (macPaused && np.startedAt !== macPaused.np.startedAt) macPaused = null;
      if (!macPaused) return { kind: "mac-live", nowPlaying: np };
    }
    // Paused-on-Mac (v2.2): the Mac was stopped at a position we remember.
    if (macPaused) {
      return {
        kind: "mac-paused",
        nowPlaying: macPaused.np,
        offsetSec: macPaused.offsetSec,
      };
    }
    // Otherwise, any loaded phone replay (playing, paused, or awaiting a tap).
    if (phoneMeta) {
      return { kind: "phone-replay", entry: phoneMeta, index: currentIndex };
    }
    return { kind: "none" };
  }

  function isMacLive() {
    return computePlayerState().kind === "mac-live";
  }

  /* --------------- mac-live progress with pause anchor --------------- */
  let macTrackKey = null;
  let macPausedAccumMs = 0;
  let macPauseStartMs = null;
  function macElapsedMs(np) {
    const key = `${np.startedAt}|${(np.text || "").slice(0, 24)}`;
    if (key !== macTrackKey) {
      macTrackKey = key;
      macPausedAccumMs = 0;
      macPauseStartMs = null;
    }
    const started = Date.parse(np.startedAt);
    if (!Number.isFinite(started)) return 0;
    const paused = !!snapshot.paused;
    if (paused && macPauseStartMs === null) macPauseStartMs = Date.now();
    if (!paused && macPauseStartMs !== null) {
      macPausedAccumMs += Date.now() - macPauseStartMs;
      macPauseStartMs = null;
    }
    const nowRef = paused ? macPauseStartMs : Date.now();
    const rate = np.playbackRate && np.playbackRate > 0 ? np.playbackRate : 1;
    return Math.max(0, (nowRef - started - macPausedAccumMs) * rate);
  }
  function macDurationMs(np) {
    const alignment = np.alignment;
    if (Array.isArray(alignment) && alignment.length) {
      let maxMs = 0;
      for (const row of alignment) {
        const ms = row?.[1];
        if (typeof ms === "number" && ms > maxMs) maxMs = ms;
      }
      if (maxMs > 0) return maxMs + 400;
    }
    const cps = np.approxCharsPerSec > 0 ? np.approxCharsPerSec : 15;
    const guess = ((np.text || "").length / cps) * 1000;
    return guess > 0 ? guess : 60000;
  }

  /* --------------- phone track duration --------------- */
  function trackDurationSec() {
    // Live stream: element duration is meaningless (chunked, offset-relative) —
    // estimate from the nowPlaying frame like the Mac plane does.
    if (liveMode && liveNp) return macDurationMs(liveNp) / 1000;
    const d = audio.duration;
    if (Number.isFinite(d) && d > 0) return d;
    const alignment = phoneMeta?.alignment;
    if (Array.isArray(alignment) && alignment.length) {
      let maxMs = 0;
      for (const row of alignment) {
        const ms = row?.[1];
        if (typeof ms === "number" && ms > maxMs) maxMs = ms;
      }
      if (maxMs > 0) return maxMs / 1000 + 0.4;
    }
    return 0;
  }

  function karaokeFromAlignment(text, alignment, elapsedMs) {
    if (Array.isArray(alignment) && alignment.length) {
      let active = -1;
      for (let i = 0; i < alignment.length; i++) {
        const startMs = alignment[i][1];
        if (typeof startMs === "number" && startMs <= elapsedMs) active = i;
      }
      return alignment
        .map(([word], i) => {
          const cls = i === active ? "w on" : i < active ? "w past" : "w";
          return `<span class="${cls}">${escapeHtml(word)}</span>`;
        })
        .join(" ");
    }
    return escapeHtml(text || "");
  }

  /* ============================================================
     §2  UNIFIED PLAYER (mini + expanded)
     ============================================================ */
  // Static one-line preview — CSS handles ellipsis, no marquee/karaoke (§C2).
  let lastPreviewText = null;
  function setMiniPreview(text) {
    if (text === lastPreviewText) return;
    lastPreviewText = text;
    miniPreview.textContent = text || "";
  }

  // Player "subject" = who + what the player is currently about.
  function playerSubject() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live" || ps.kind === "mac-paused") {
      const np = ps.nowPlaying;
      const agent = agentForSession(np.sessionId);
      return {
        character: agent ? avatarDir(agent) : "default",
        name: agent ? agent.label || agent.name : np.sessionId.slice(0, 8),
        preview: (np.text || "").slice(0, 120),
        sessionId: np.sessionId,
      };
    }
    if (ps.kind === "phone-replay") {
      const e = ps.entry;
      return {
        character: entryCharacter(e),
        name: entryName(e),
        preview: phonePendingTap
          ? "Ready — tap to play"
          : e.spokenText || e.textPreview || "",
        sessionId: e.sessionId || null,
      };
    }
    // Handoff in flight (mac stopped, phone file not yet arrived): keep the
    // player visible with the moving-over subject.
    if (handoffAwait) {
      return {
        character: handoffAwait.character,
        name: handoffAwait.name,
        preview: "Moving to this phone…",
        sessionId: handoffAwait.sessionId,
      };
    }
    return null;
  }

  // Returns the icon id ("play" | "pause") for the current transport state.
  function ppIcon() {
    const ps = computePlayerState();
    if (ps.kind === "mac-live") return snapshot.paused ? "play" : "pause";
    if (ps.kind === "mac-paused") return "play";
    if (ps.kind === "phone-replay") {
      if (phonePendingTap) return "play";
      return !audio.paused && !audio.ended ? "pause" : "play";
    }
    return "play";
  }
  let lastPpIcon = null;
  function renderPpButtons() {
    // Busy = a round-trip (Mac stop/resume) or file load is in flight — show
    // a spinner and refuse taps so "is it working?" never needs a second tap.
    const busy = macActionPending || phoneLoading;
    const id = busy ? "spinner" : ppIcon();
    miniPp.disabled = busy;
    btnPp.disabled = busy;
    if (id === lastPpIcon) return;
    lastPpIcon = id;
    const html = busy ? iconHtml("rotate-ccw", "spin") : iconHtml(id, "filled");
    miniPp.innerHTML = html;
    btnPp.innerHTML = html;
  }

  function renderMiniChrome() {
    const subject = playerSubject();
    const show = !!subject;
    if (show) {
      mini.classList.add("on");
      document.body.classList.remove("player-hidden");
    } else {
      mini.classList.remove("on");
      document.body.classList.add("player-hidden");
      lastPreviewText = null;
      return;
    }
    const ps = computePlayerState();
    const macl = ps.kind === "mac-live" || ps.kind === "mac-paused";
    const frame = ps.kind === "mac-live" ? "speaking" : "idle";
    miniName.textContent = subject.name;
    miniAvatar.onerror = () => {
      miniAvatar.onerror = null;
      miniAvatar.src = avatarSrc("default", frame);
    };
    setImg(miniAvatar, avatarSrc(subject.character, frame));
    // Device glyph: laptop (Mac, accent) / smartphone (phone).
    if (miniDevice.dataset.macl !== String(macl)) {
      miniDevice.dataset.macl = String(macl);
      miniDevice.innerHTML = iconHtml(macl ? "laptop" : "smartphone");
    }
    miniDevice.classList.toggle("mac", macl);
    setMiniPreview(subject.preview || "");
    renderPpButtons();
    updatePlayerProgress();
  }

  // Minimal markdown → HTML for the Message tab (agent messages are markdown).
  // Escapes first, then transforms — covers fenced/inline code, headings,
  // bold/italic, links, and lists; everything else renders as paragraphs.
  function mdToHtml(src) {
    const esc = (s) =>
      s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const inline = (s) =>
      s
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>")
        .replace(
          /\[([^\]]+)\]\((https?:[^)\s]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>'
        );
    let out = "";
    const parts = String(src || "").split(/```/);
    for (let i = 0; i < parts.length; i++) {
      if (i % 2 === 1) {
        // Fenced block — drop an optional language tag on the first line.
        const code = parts[i].replace(/^[^\n]*\n/, "");
        out += `<pre><code>${esc(code)}</code></pre>`;
        continue;
      }
      const lines = esc(parts[i]).split("\n");
      let list = null; // "ul" | "ol" while inside a list
      let para = [];
      const closeList = () => { if (list) { out += `</${list}>`; list = null; } };
      const flushPara = () => {
        if (para.length) { out += `<p>${inline(para.join(" "))}</p>`; para = []; }
      };
      for (const raw of lines) {
        const line = raw.trimEnd();
        const h = line.match(/^#{1,6}\s+(.*)$/);
        const ul = line.match(/^\s*[-*]\s+(.*)$/);
        const ol = line.match(/^\s*\d+[.)]\s+(.*)$/);
        if (!line.trim()) { flushPara(); closeList(); continue; }
        if (h) { flushPara(); closeList(); out += `<div class="md-h">${inline(h[1])}</div>`; continue; }
        if (ul || ol) {
          flushPara();
          const want = ul ? "ul" : "ol";
          if (list !== want) { closeList(); out += `<${want}>`; list = want; }
          out += `<li>${inline((ul || ol)[1])}</li>`;
          continue;
        }
        closeList();
        para.push(line);
      }
      flushPara();
      closeList();
    }
    return out || "<p></p>";
  }

  function subjectMessageText(ps) {
    // Message tab = the agent's ORIGINAL text (paths and all), never the
    // character transcript; transcript lives in the other tab.
    if (ps.kind === "mac-live" || ps.kind === "mac-paused") {
      const np = ps.nowPlaying;
      return np.rawText || np.text || "";
    }
    if (ps.kind === "phone-replay") {
      const e = ps.entry;
      return e.rawText || e.spokenText || e.textPreview || "";
    }
    return "";
  }

  function renderExpandedContent() {
    const transcript = expTab === "transcript";
    for (const t of expTabs.querySelectorAll(".exp-tab")) {
      t.classList.toggle("active", t.getAttribute("data-exptab") === expTab);
    }
    expKaraokeEl.hidden = !transcript;
    expMessage.hidden = transcript;
    if (transcript) {
      updateExpandedKaraoke();
    } else {
      expMessage.innerHTML = mdToHtml(subjectMessageText(computePlayerState()));
    }
  }

  function renderExpandedChrome() {
    const ps = computePlayerState();
    const subject = playerSubject();
    const cAgent = convoAgent();
    if (!subject && !cAgent) {
      // Nothing to show — force-collapse.
      closeExpanded();
      return;
    }
    if (cAgent) {
      // Conversation view owns the whole sheet: header, thread, and reply box
      // all come from cAgent — NEVER the playback subject, which may belong
      // to a different session (opening A's chat while B's clip is loaded).
      renderConvo(cAgent);
      expStatus.hidden = true;
      return;
    }
    expanded.classList.remove("convo", "live-on", "show-call");
    callViewOpen = false;
    // Mac-owned covers paused-on-Mac too — the device row must keep showing
    // Mac as the source (so "This phone" reads as a transfer), and stop/
    // restart stay available. Speaking animation is live-only.
    const macl = ps.kind === "mac-live" || ps.kind === "mac-paused";
    const phone = ps.kind === "phone-replay";
    const expFrame = ps.kind === "mac-live" ? "speaking" : "idle";
    expAvatar.onerror = () => {
      expAvatar.onerror = null;
      expAvatar.src = avatarSrc("default", expFrame);
    };
    setImg(expAvatar, avatarSrc(subject.character, expFrame));
    expName.textContent = subject.name;

    // Handoff status line (mac→phone in flight).
    expStatus.hidden = !handoffAwait;
    if (handoffAwait) expStatus.textContent = "Moving to this phone…";

    // Device row reflects the ACTUAL current source (green when Mac). While a
    // handoff to phone is in flight, phone is the destination source.
    const sourceDevice = macl ? "mac" : "phone";
    for (const seg of expDeviceRow.querySelectorAll(".seg")) {
      const dev = seg.getAttribute("data-device");
      const active = dev === sourceDevice;
      seg.classList.toggle("active", active);
      seg.classList.toggle("source-mac", active && dev === "mac");
    }

    // Transport visibility: prev/next and speed are phone-only (Mac rate is
    // baked/atempo); stop is mac-owned; play/pause always shown. Mac progress
    // is seekable once replayFile exists.
    btnSpeed.hidden = !phone;
    btnSpeed.disabled = false;
    updateSpeedLabel();
    btnPrev.hidden = !phone;
    btnNext.hidden = !phone;
    btnStop.hidden = !macl;
    renderPpButtons();
    const macSeekable =
      macl && !!(ps.kind === "mac-paused" || ps.nowPlaying?.replayFile);
    $("progress").classList.toggle("seekable", phone || macSeekable);

    if (phone) {
      btnPrev.disabled = currentIndex <= 0;
      btnNext.disabled = currentIndex < 0 || currentIndex >= replayList.length - 1;
    }

    renderExpandedReply(subject);
    updatePlayerProgress();
    renderExpandedContent();
  }

  let lastExpReplyAgent = null;
  function renderExpandedReply(subject) {
    const agent = subject.sessionId ? agentForSession(subject.sessionId) : null;
    const id = agent ? agent.sessionId : null;
    // Only rebuild when the subject agent changes — otherwise a snapshot tick
    // would wipe the textarea mid-type (Wispr Flow needs a stable field).
    if (id === lastExpReplyAgent && expReplyWrap.querySelector(".reply-box")) return;
    lastExpReplyAgent = id;
    if (!agent) {
      expReplyWrap.innerHTML = "";
      return;
    }
    expReplyWrap.innerHTML = replyBoxHtml(agent, "exp");
  }

  /* ============================================================
     Conversation view + live mode v2 (reply-capable agents)
     ============================================================ */
  const expLiveBtn = $("exp-live-btn");
  const expThread = $("exp-thread");
  const cvChatAv = $("cv-chat-av");
  const cvChatName = $("cv-chat-name");
  const cvChatDot = $("cv-chat-dot");
  const cvChatStatus = $("cv-chat-status");
  const cvPlaybackStrip = $("cv-playback-strip");
  const cvStripPp = $("cv-strip-pp");
  const cvStripKaraoke = $("cv-strip-karaoke");
  const cvReplyInput = $("cv-reply-input");
  const cvPresence = $("cv-presence");
  const cvInfoCard = $("cv-info-card");
  const cvCardTag = $("cv-card-tag");
  const cvCardBody = $("cv-card-body");
  const cvCallTimer = $("cv-call-timer");
  const cvPinTimer = $("cv-pin-timer");
  const cvCallCredits = $("cv-call-credits");
  // Separate element for ack clips so they never clobber the main player.
  const ackAudio = new Audio();
  let convoOverride = null; // sessionId opened from a card (no active playback)
  const ackEvents = {}; // sessionId → [{at}] — this page load only
  const liveClipCounts = {}; // sessionId → live clips heard this turn
  const threadCache = {}; // sessionId → { items, fetchedAt }
  let lastAckAt = null;
  let lastThreadSig = null;
  let lastCardSig = null;
  let callViewOpen = false; // true = call panel on top while live
  let liveStartedAt = null; // Date.now() when live began this session
  let lastComposerSession = null;
  let threadFetchGen = 0;

  // The agent whose conversation the sheet should show: an explicit card-open
  // wins; otherwise the player subject when that session is reply-capable.
  function convoAgent() {
    const sid = convoOverride || playerSubject()?.sessionId;
    if (!sid) return null;
    const agent = agentForSession(sid);
    return agent && isInjectable(agent) ? agent : null;
  }

  function normalizeWs(s) {
    return String(s || "").replace(/\s+/g, " ").trim();
  }

  async function fetchThread(sessionId) {
    const gen = ++threadFetchGen;
    try {
      const r = await fetch(`/thread/${encodeURIComponent(sessionId)}?limit=40`);
      if (!r.ok) return;
      const data = await r.json();
      if (gen !== threadFetchGen) return;
      threadCache[sessionId] = {
        items: Array.isArray(data.items) ? data.items : [],
        fetchedAt: Date.now(),
      };
      lastThreadSig = null;
      if (expanded.classList.contains("open") && convoAgent()?.sessionId === sessionId) {
        renderConvo(convoAgent());
      }
    } catch { /* endpoint may not be up yet during parallel build */ }
  }

  function ensureThread(sessionId) {
    if (!threadCache[sessionId]) fetchThread(sessionId);
  }

  function findReplayForFinal(sessionId, text) {
    const prefix = normalizeWs(text).slice(0, 200);
    if (!prefix) return null;
    let best = null;
    for (const e of allReplayList) {
      if (e.sessionId !== sessionId || e.kind === "ack" || e.kind === "live" || !e.file) continue;
      const raw = normalizeWs(e.rawText || "");
      if (raw.startsWith(prefix)) best = e; // newest wins (list is chrono ascending)
    }
    return best;
  }

  function lastFinalText(sessionId) {
    const items = threadCache[sessionId]?.items || [];
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (it.role === "agent" && it.final) return it.text || "";
    }
    return "";
  }

  function speakingOnPhone(agent) {
    const ps = computePlayerState();
    if (ps.kind !== "phone-replay") return false;
    if (ps.entry?.sessionId !== agent.sessionId) return false;
    if (!audio.src || audio.ended) return false;
    return !audio.paused; // actively audible
  }

  // Strip stays up while a clip is loaded for this session (playing or paused).
  function stripActiveFor(agent) {
    const ps = computePlayerState();
    if (ps.kind !== "phone-replay") return false;
    if (ps.entry?.sessionId !== agent.sessionId) return false;
    return !!(audio.src && !audio.ended && phoneMeta);
  }

  function finalPendingOnPhone(agent) {
    const np = snapshot.nowPlaying;
    if (!np || np.sessionId !== agent.sessionId) return false;
    if (np.kind === "live") return false;
    if (np.output !== "phone") return false;
    if (!isNowPlayingActive(np)) return false;
    // Active final grant that hasn't started audible playback yet.
    if (speakingOnPhone(agent) && !audio.paused && !audio.ended) return false;
    return phoneLoading || phonePendingTap || isPhoneIdle() || audio.paused;
  }

  function fmtLiveElapsed() {
    if (!liveStartedAt) return "0:00";
    const sec = Math.max(0, Math.floor((Date.now() - liveStartedAt) / 1000));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function threadBubbleHtml(item, agent, liveOn) {
    // _ack first — ack events ride with role:"user" for sort order only.
    if (item._ack) {
      return `<div class="cv-ack">🔊 acknowledged</div>`;
    }
    if (item.role === "user") {
      return `<div class="cv-bubble cv-me">${escapeHtml(item.text || "")}</div>`;
    }
    const text = item.text || "";
    const dim = item.final ? "" : " cv-dim";
    const body = escapeHtml(text.length > 400 ? text.slice(0, 400) + "…" : text);
    let meta = "";
    if (!liveOn && item.final) {
      const replay = findReplayForFinal(agent.sessionId, text);
      if (replay) {
        meta = `<div class="cv-meta"><button type="button" class="cv-play" data-cv-play="${escapeHtml(replay.file)}">${iconHtml("play", "sm")} Play</button></div>`;
      }
    }
    return `<div class="cv-bubble cv-agent${dim}">${body}${meta}</div>`;
  }

  function autoGrowComposer(ta) {
    if (!ta) return;
    ta.style.height = "34px";
    ta.style.height = Math.min(ta.scrollHeight, 88) + "px";
  }

  function renderComposer(agent) {
    const sid = agent.sessionId;
    // Wispr-Flow-stable: never rebuild the field while same session owns it.
    if (lastComposerSession === sid && cvReplyInput.isConnected) {
      cvReplyInput.placeholder = `Reply to ${agent.label || agent.name}…`;
      return;
    }
    lastComposerSession = sid;
    cvReplyInput.value = replyDrafts[sid] || "";
    cvReplyInput.placeholder = `Reply to ${agent.label || agent.name}…`;
    cvReplyInput.setAttribute("data-reply-for", sid);
    autoGrowComposer(cvReplyInput);
  }

  function renderPlaybackStrip(agent) {
    const active = stripActiveFor(agent);
    cvPlaybackStrip.classList.toggle("show", active);
    if (!active) {
      cvStripKaraoke.textContent = "";
      return;
    }
    const paused = audio.paused;
    cvStripPp.innerHTML = paused
      ? `<svg class="icon filled"><use href="#i-play"/></svg>`
      : `<svg class="icon filled"><use href="#i-pause"/></svg>`;
    cvStripPp.setAttribute("aria-label", paused ? "Play" : "Pause");
    updateStripKaraoke();
  }

  function updateStripKaraoke() {
    if (!cvPlaybackStrip.classList.contains("show")) return;
    const ps = computePlayerState();
    if (ps.kind !== "phone-replay") return;
    const e = ps.entry;
    const elapsed = ((liveMode ? liveBaseSec : 0) + (audio.currentTime || 0)) * 1000;
    cvStripKaraoke.innerHTML = karaokeFromAlignment(
      e.spokenText || e.textPreview || "",
      e.alignment,
      elapsed
    );
    const on = cvStripKaraoke.querySelector(".w.on");
    if (on) {
      try { on.scrollIntoView({ inline: "center", block: "nearest" }); } catch { /* noop */ }
    }
  }

  function renderCallCard(agent, liveOn) {
    if (!liveOn) {
      cvInfoCard.hidden = true;
      lastCardSig = null;
      return;
    }
    // Precedence: audible speech wins; otherwise a NEW turn (working) must
    // beat a lingering previous final — after a clip ends, audio.paused and
    // isPhoneIdle stay true while the old now-playing record is still
    // un-ended, so pending-before-working froze the old message on the card
    // when a follow-up reply arrived.
    const speaking = speakingOnPhone(agent);
    const working = !speaking && agent.state === "working";
    const pending = !speaking && !working && finalPendingOnPhone(agent);
    const activity = agent.live?.lastActivity;
    const tools = agent.live?.toolCount || 0;
    let mode;
    let tag;
    let tagCls;
    let bodyHtml;
    let dim = false;

    if (speaking) {
      mode = "speaking";
      const isLiveClip = snapshot.nowPlaying?.kind === "live";
      tag = isLiveClip ? "Speaking" : "Final";
      tagCls = "speaking";
      dim = isLiveClip;
      bodyHtml = `<div class="speaking-words" id="cv-call-karaoke"></div>`;
    } else if (pending) {
      mode = "final-pending";
      tag = "Final";
      tagCls = "final";
      const text = snapshot.nowPlaying?.text || lastFinalText(agent.sessionId) || "…";
      bodyHtml = `${escapeHtml(text)}<div class="tool-count">auto-playing…</div>`;
    } else if (working) {
      mode = "working";
      tag = "Working";
      tagCls = "working";
      const label = activity?.label || "working";
      bodyHtml = `<div class="activity-row"><span>${escapeHtml(label)}</span><span class="cv-dots"><i>.</i><i>.</i><i>.</i></span></div>`;
      const ackFresh =
        ackFlash && ackFlash.sessionId === agent.sessionId && Date.now() < ackFlash.until;
      if (ackFresh) bodyHtml += `<div class="tool-count">🔊 acknowledged</div>`;
      else if (tools) bodyHtml += `<div class="tool-count">${tools} tool${tools === 1 ? "" : "s"} so far</div>`;
    } else {
      mode = "idle";
      tag = "Done";
      tagCls = "done";
      const text = lastFinalText(agent.sessionId);
      bodyHtml = text ? escapeHtml(text) : `<span style="color:var(--muted)">Listening…</span>`;
    }

    const sig = `${mode}|${tag}|${tools}|${activity?.label || ""}|${ackFlash && Date.now() < ackFlash.until ? 1 : 0}|${(snapshot.nowPlaying?.text || "").slice(0, 40)}`;
    if (sig !== lastCardSig) {
      lastCardSig = sig;
      cvInfoCard.hidden = false;
      cvCardTag.textContent = tag;
      cvCardTag.className = `tag ${tagCls}`;
      cvCardBody.className = `body${dim ? " dim" : ""}`;
      cvCardBody.innerHTML = bodyHtml;
    }
    cvPresence.classList.toggle("working-ring", mode === "working");
    cvPresence.classList.toggle("final-ring", mode === "final-pending" || (mode === "idle" && !!lastFinalText(agent.sessionId)));
  }

  function renderConvo(agent) {
    const liveOn = !!agent.live?.on;
    const working = agent.state === "working";
    expanded.classList.add("convo");
    expanded.classList.toggle("live-on", liveOn);
    // Call is the base surface while live; chat overlays when callViewOpen is false.
    if (!liveOn) callViewOpen = false;
    expanded.classList.toggle("show-call", liveOn && callViewOpen);

    if (liveOn && !liveStartedAt) liveStartedAt = Date.now();
    if (!liveOn) liveStartedAt = null;

    const speakingHere = speakingOnPhone(agent);
    const frame = speakingHere ? "speaking" : "idle";
    const avSrc = avatarSrc(avatarDir(agent), frame);
    const name = agent.label || agent.name;

    cvChatAv.onerror = () => { cvChatAv.onerror = null; cvChatAv.src = avatarSrc("default", frame); };
    setImg(cvChatAv, avSrc);
    cvChatName.textContent = name;

    let dot = "ready";
    let statusText = agent.state === "hand_raised" ? "update ready" : "ready";
    if (liveOn) { dot = "live"; statusText = "live · call continues"; }
    else if (speakingHere) { dot = "ready"; statusText = "speaking"; }
    else if (working) { dot = "working"; statusText = "working…"; }
    cvChatDot.className = `dot ${dot}`;
    cvChatStatus.textContent = statusText;

    expLiveBtn.classList.toggle("armed", !liveOn && working);
    expLiveBtn.querySelector(".lbl").textContent = "Go live";

    const n = liveClipCounts[agent.sessionId] || 0;
    cvCallCredits.textContent = `live · ${n} clip${n === 1 ? "" : "s"}`;
    $("cv-call-chip-name").textContent = name;
    $("cv-pin-name").textContent = name;
    const chipAv = $("cv-call-chip-av");
    chipAv.onerror = () => { chipAv.onerror = null; chipAv.src = avatarSrc("default", frame); };
    setImg(chipAv, avSrc);
    cvPresence.onerror = () => { cvPresence.onerror = null; cvPresence.src = avatarSrc("default", frame); };
    setImg(cvPresence, avSrc);

    const elapsed = fmtLiveElapsed();
    cvCallTimer.textContent = elapsed;
    cvPinTimer.textContent = elapsed;

    ensureThread(agent.sessionId);
    renderComposer(agent);
    renderPlaybackStrip(agent);
    renderCallCard(agent, liveOn);

    // Thread from /thread + page-local ack chips. No working row when live ON
    // (ownership: call card only).
